<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forjify - Digital Marketplace for Creators</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-deep-charcoal text-white">
    <nav class="bg-deep-charcoal border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="/" class="text-2xl font-bold text-electric-blue">Forjify</a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#home" class="text-gray-300 hover:text-electric-blue transition-colors">Home</a>
                    <a href="#features" class="text-gray-300 hover:text-electric-blue transition-colors">Features</a>
                    <a href="#products" class="text-gray-300 hover:text-electric-blue transition-colors">Products</a>
                    <a href="#pricing" class="text-gray-300 hover:text-electric-blue transition-colors">Pricing</a>
                    <a href="/login" class="bg-electric-blue text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors text-center">Login</a>
                    <a href="/signup" class="border border-electric-blue text-electric-blue px-4 py-2 rounded-lg hover:bg-electric-blue hover:text-white transition-colors text-center">Sign Up</a>
                </div>
                <div class="md:hidden">
                    <button id="mobileMenuBtn" class="text-gray-300 hover:text-white">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Mobile Menu Script
        const btn = document.getElementById('mobileMenuBtn');
        btn.addEventListener('click', () => {
            alert('Mobile navigation is currently being forj-ed! Use desktop for full access.');
        });
    </script>
</body>
</html>
