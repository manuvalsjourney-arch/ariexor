<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Analytics | ariexor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0b14; color: #e2e8f0; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-glow-blue { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
        .stat-value { background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-6 lg:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">Analytics</h1>
                <p class="text-slate-500 mt-1 uppercase text-xs tracking-[0.2em] font-bold">Performance Dashboard</p>
            </div>
            <div class="flex gap-3">
                <a href="index.html" class="glass-card px-4 py-2 rounded-xl text-sm font-medium hover:bg-white/5 transition-all flex items-center gap-2">
                    <i data-lucide="home" class="w-4 h-4"></i> Marketplace
                </a>
                <a href="dashboard.html" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-lg shadow-indigo-500/30">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add Product
                </a>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="glass-card p-6 rounded-3xl neon-glow-blue">
                <div class="flex items-center gap-3 mb-4 text-indigo-400">
                    <i data-lucide="package" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold tracking-widest uppercase text-slate-500">Total Assets</span>
                </div>
                <h2 id="totalItems" class="text-3xl font-bold stat-value">0</h2>
            </div>

            <div class="glass-card p-6 rounded-3xl">
                <div class="flex items-center gap-3 mb-4 text-emerald-400">
                    <i data-lucide="dollar-sign" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold tracking-widest uppercase text-slate-500">Market Value</span>
                </div>
                <h2 id="totalValue" class="text-3xl font-bold stat-value">$0.00</h2>
            </div>

            <div class="glass-card p-6 rounded-3xl">
                <div class="flex items-center gap-3 mb-4 text-purple-400">
                    <i data-lucide="trending-up" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold tracking-widest uppercase text-slate-500">Avg. Listing</span>
                </div>
                <h2 id="avgPrice" class="text-3xl font-bold stat-value">$0.00</h2>
            </div>

            <div class="glass-card p-6 rounded-3xl">
                <div class="flex items-center gap-3 mb-4 text-blue-400">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold tracking-widest uppercase text-slate-500">Account Type</span>
                </div>
                <h2 class="text-3xl font-bold stat-value uppercase tracking-tighter">Seller</h2>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] overflow-hidden border-white/5">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-lg font-bold">Listing Management</h3>
                <span class="text-xs bg-indigo-500/10 text-indigo-400 px-3 py-1 rounded-full font-bold uppercase tracking-widest">Live Sync</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-slate-500 text-[10px] uppercase font-black tracking-[0.15em] border-b border-white/5 bg-white/[0.01]">
                        <tr>
                            <th class="px-8 py-5">Asset</th>
                            <th class="px-8 py-5">Status</th>
                            <th class="px-8 py-5">Price</th>
                            <th class="px-8 py-5 text-right">Control</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryList" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
            
            <div id="loading" class="p-20 text-center">
                <div class="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="text-slate-500 text-sm font-medium">Syncing with Marketplace...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        lucide.createIcons();

        const SUPABASE_URL = 'https://qtewpjdnnjgvfgllgryy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchAnalytics() {
            // Using your specific seller_id found in the product_details table
            const { data, error } = await sb
                .from('product_details')
                .select('*')
                .eq('seller_id', '0ace8f40-0d76-43ef-826a-ea6c977b750b')
                .order('id', { ascending: false });

            const list = document.getElementById('inventoryList');
            const loading = document.getElementById('loading');

            if (data && data.length > 0) {
                loading.classList.add('hidden');
                
                // Update Global Stats
                document.getElementById('totalItems').innerText = data.length;
                const totalValue = data.reduce((sum, item) => sum + (item.price || 0), 0);
                document.getElementById('totalValue').innerText = `$${totalValue.toLocaleString()}`;
                document.getElementById('avgPrice').innerText = `$${(totalValue / data.length).toFixed(2)}`;

                list.innerHTML = data.map(item => `
                    <tr class="hover:bg-white/[0.02] transition-colors group">
                        <td class="px-8 py-6">
                            <div class="flex items-center gap-4">
                                <img src="${item.image_url}" class="w-14 h-14 rounded-2xl object-cover bg-slate-900 border border-white/10 shadow-2xl">
                                <div>
                                    <p class="font-bold text-white group-hover:text-indigo-400 transition-colors">${item.title}</p>
                                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">${item.description.substring(0, 30)}...</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <span class="flex items-center gap-1.5 text-[10px] font-black uppercase text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded-md w-fit">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                Active
                            </span>
                        </td>
                        <td class="px-8 py-6">
                            <span class="text-lg font-mono font-bold text-indigo-400">$${item.price}</span>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <button onclick="deleteAsset(${item.id})" class="p-2 hover:bg-red-500/10 text-slate-600 hover:text-red-500 rounded-xl transition-all">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } else {
                loading.innerHTML = `<p class="text-slate-500">No active listings found.</p>`;
            }
        }

        async function deleteAsset(id) {
            if(confirm('Are you sure you want to remove this asset from the market?')) {
                const { error } = await sb.from('product_details').delete().eq('id', id);
                if (!error) fetchAnalytics();
            }
        }

        fetchAnalytics();
    </script>
</body>
</html>
