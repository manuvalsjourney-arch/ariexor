<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forjify | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-deep-charcoal text-white min-h-screen">
  <nav class="bg-deep-charcoal border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="/" class="text-2xl font-bold text-electric-blue">Forjify</a>
        <div class="space-x-4">
          <a href="/#features" class="text-gray-300 hover:text-electric-blue transition-colors">Features</a>
          <a href="/signup" class="border border-electric-blue text-electric-blue px-4 py-2 rounded-lg hover:bg-electric-blue hover:text-white transition-colors">Sign Up</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-16">
    <div class="grid gap-12 lg:grid-cols-[1.2fr_0.8fr] items-center">
      <div>
        <p class="text-sm uppercase tracking-[0.3em] text-electric-blue mb-4">Welcome back to Forjify</p>
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-6">Login to your creator dashboard</h1>
        <p class="text-gray-300 text-lg max-w-xl">
          Access your digital storefront, manage listings, and review sales from one elegant dark-themed portal.
        </p>
      </div>

      <section class="bg-gray-900/95 border border-gray-800 rounded-3xl p-8 shadow-2xl">
        <h2 class="text-2xl font-semibold text-white mb-6">Sign in</h2>
        <form class="space-y-5" onsubmit="event.preventDefault(); alert('Login logic coming soon!');">
          <label class="block">
            <span class="text-gray-300">Email</span>
            <input type="email" required class="mt-2 w-full rounded-2xl border border-gray-700 bg-gray-900 px-4 py-3 text-white outline-none focus:border-electric-blue focus:ring-2 focus:ring-electric-blue/30" placeholder="you@forjify.com" />
          </label>

          <label class="block">
            <span class="text-gray-300">Password</span>
            <input type="password" required minlength="8" class="mt-2 w-full rounded-2xl border border-gray-700 bg-gray-900 px-4 py-3 text-white outline-none focus:border-electric-blue focus:ring-2 focus:ring-electric-blue/30" placeholder="Enter your password" />
          </label>

          <button type="submit" class="w-full bg-electric-blue hover:bg-blue-700 text-white font-semibold rounded-2xl px-4 py-3 transition">
            Login
          </button>
        </form>

        <p class="mt-6 text-center text-gray-400">
          New to Forjify?
          <a href="/signup" class="text-electric-blue hover:text-blue-300">Create an account</a>
        </p>
      </section>
    </div>
  </main>
  <script>lucide.createIcons();</script>
</body>
</html>
