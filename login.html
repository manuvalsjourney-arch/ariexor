<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ariexo | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-deep-charcoal text-white min-h-screen flex flex-col">
  <nav class="p-6">
    <a href="/" class="text-2xl font-bold text-electric-blue tracking-tighter">ariexo</a>
  </nav>

  <main class="flex-grow flex items-center justify-center px-4">
    <section class="max-w-md w-full bg-gray-900/50 border border-gray-800 rounded-3xl p-8 shadow-2xl">
      <h2 class="text-2xl font-bold mb-6">Welcome Back</h2>
      <form id="loginForm" class="space-y-4">
        <input id="email" type="email" required class="w-full rounded-2xl border border-gray-700 bg-gray-900 px-4 py-3 text-white outline-none focus:border-electric-blue" placeholder="Email" />
        <input id="password" type="password" required class="w-full rounded-2xl border border-gray-700 bg-gray-900 px-4 py-3 text-white outline-none focus:border-electric-blue" placeholder="Password" />
        <button type="submit" id="submitBtn" class="w-full bg-electric-blue py-4 rounded-2xl font-bold hover:bg-blue-600 transition-all">Login</button>
      </form>
      <p class="mt-6 text-center text-gray-400 text-sm">
        New here? <a href="/signup" class="text-electric-blue hover:underline">Join ariexo</a>
      </p>
    </section>
  </main>

  <script>
    const supabaseUrl = 'https://qtewpjdnnjgvfgllgryy.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const { error } = await _supabase.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });

      if (error) alert(error.message);
      else window.location.href = "/";
    });
  </script>
</body>
</html>
