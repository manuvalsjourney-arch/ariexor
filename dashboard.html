<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: #0b0b14; color: white; font-family: 'Inter'; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-2xl glass-card p-10 rounded-[2.5rem]">
        <h1 id="pageTitle" class="text-3xl font-extrabold mb-8 text-indigo-500">List New Product</h1>
        <form id="productForm" class="space-y-6">
            <input type="text" id="title" placeholder="Title" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" required>
            <textarea id="description" placeholder="Description" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none h-32" required></textarea>
            <input type="number" id="price" step="0.01" placeholder="Price ($)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" required>
            
            <div class="grid grid-cols-2 gap-4">
                <input type="file" id="imageInput" accept="image/*" class="text-xs">
                <input type="file" id="pdfInput" accept=".pdf,.zip" class="text-xs">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 py-5 rounded-2xl font-bold">Publish Product</button>
        </form>
    </div>

    <script>
        const sb = supabase.createClient('https://qtewpjdnnjgvfgllgryy.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU');
        const MY_SELLER_ID = 'e0bed6bb-f967-436b-9cb2-76c78a5538d5';
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');

        async function init() {
            if (editId) {
                const { data } = await sb.from('product_details').select('*').eq('id', editId).single();
                if (data && data.seller_id === MY_SELLER_ID) {
                    document.getElementById('pageTitle').innerText = "Edit Product";
                    document.getElementById('submitBtn').innerText = "Update";
                    document.getElementById('title').value = data.title;
                    document.getElementById('description').value = data.description;
                    document.getElementById('price').value = data.price;
                } else if (data) {
                    alert("Unauthorized"); window.location.href = 'index.html';
                }
            }
        }

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Processing...";

            const imgFile = document.getElementById('imageInput').files[0];
            const pdfFile = document.getElementById('pdfInput').files[0];
            let payload = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                price: parseFloat(document.getElementById('price').value)
            };

            try {
                if (imgFile) {
                    const path = `previews/${Date.now()}-${imgFile.name}`;
                    await sb.storage.from('product-images').upload(path, imgFile);
                    payload.image_url = sb.storage.from('product-images').getPublicUrl(path).data.publicUrl;
                }
                if (pdfFile) {
                    const path = `downloads/${Date.now()}-${pdfFile.name}`;
                    await sb.storage.from('product-images').upload(path, pdfFile);
                    payload.file_url = sb.storage.from('product-images').getPublicUrl(path).data.publicUrl;
                }

                if (editId) {
                    await sb.from('product_details').update(payload).eq('id', editId).eq('seller_id', MY_SELLER_ID);
                } else {
                    payload.seller_id = MY_SELLER_ID;
                    await sb.from('product_details').insert([payload]);
                }
                window.location.href = 'index.html';
            } catch (err) { alert(err.message); btn.disabled = false; }
        };

        window.onload = init;
    </script>
</body>
</html>
