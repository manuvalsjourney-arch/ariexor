<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | Digital Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, #1a1a2e, #0f0f1a); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #e2e8f0; overflow-x: hidden; }
        .blob { position: absolute; width: 500px; height: 500px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2)); filter: blur(80px); border-radius: 50%; z-index: -1; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-glass { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .input-glass:focus { border-color: #818cf8; box-shadow: 0 0 15px rgba(129, 140, 248, 0.2); outline: none; }
    </style>
</head>
<body>
    <div class="blob top-0 -left-20"></div>
    <div class="blob bottom-0 -right-20" style="background: linear-gradient(135deg, rgba(45, 212, 191, 0.15), rgba(99, 102, 241, 0.15));"></div>

    <main class="w-full max-w-2xl px-6 py-12">
        <div class="glass-card rounded-3xl p-8 md:p-10 relative overflow-hidden">
            <div class="mb-10 text-center">
                <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-indigo-200 to-purple-400 mb-2">Add New Product</h1>
                <p class="text-slate-400 text-sm">Upload your asset to the marketplace</p>
            </div>

            <form id="productForm" class="space-y-6">
                <div class="relative group">
                    <label class="block text-xs font-medium text-slate-400 mb-2 ml-1">PRODUCT TITLE</label>
                    <div class="relative">
                        <i data-lucide="package" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-indigo-400 transition-colors"></i>
                        <input type="text" id="title" required placeholder="e.g. Holographic UI Kit" class="input-glass w-full py-4 pl-12 pr-4 rounded-xl text-white">
                    </div>
                </div>

                <div class="group">
                    <label class="block text-xs font-medium text-slate-400 mb-2 ml-1">PRICE (USD)</label>
                    <div class="relative">
                        <i data-lucide="dollar-sign" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-purple-400"></i>
                        <input type="number" id="price" required step="0.01" placeholder="0.00" class="input-glass w-full py-4 pl-12 pr-4 rounded-xl text-white">
                    </div>
                </div>

                <div class="group">
                    <label class="block text-xs font-medium text-slate-400 mb-2 ml-1">DESCRIPTION</label>
                    <textarea id="description" rows="3" required placeholder="Tell us about it..." class="input-glass w-full p-4 rounded-xl text-white resize-none"></textarea>
                </div>

                <div class="group">
                    <label class="block text-xs font-medium text-slate-400 mb-2 ml-1">PRODUCT IMAGE</label>
                    <div class="border-2 border-dashed border-slate-700 hover:border-indigo-500 rounded-2xl p-6 text-center cursor-pointer relative transition-all">
                        <i data-lucide="image" class="w-8 h-8 text-slate-500 mx-auto mb-2"></i>
                        <p id="fileName" class="text-sm text-slate-400">Click to select product image</p>
                        <input type="file" id="imageInput" accept="image/*" required class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 py-4 rounded-xl font-bold text-white transition-all shadow-lg shadow-indigo-500/20">
                    Publish to Marketplace
                </button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        lucide.createIcons();

        const SUPABASE_URL = 'https://qtewpjdnnjgvfgllgryy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('productForm');
        const imgInput = document.getElementById('imageInput');
        const fileNameText = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');

        imgInput.onchange = () => { if(imgInput.files[0]) fileNameText.innerText = imgInput.files[0].name; };

        form.onsubmit = async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Uploading Assets...";

            try {
                // 1. Upload File
                const file = imgInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                const filePath = `product-images/${fileName}`;

                const { error: uploadError } = await sb.storage.from('product-images').upload(filePath, file);
                if (uploadError) throw uploadError;

                // 2. Get URL
                const { data: urlData } = sb.storage.from('product-images').getPublicUrl(filePath);
                const publicUrl = urlData.publicUrl;

                // 3. Save to Table
                const { error: dbError } = await sb.from('product_details').insert([{
                    title: document.getElementById('title').value,
                    description: document.getElementById('description').value,
                    price: parseFloat(document.getElementById('price').value),
                    image_url: publicUrl,
                    seller_id: '0ace8f40-0d76-43ef-826a-ea6c977b750b'
                }]);

                if (dbError) throw dbError;

                alert('✨ Successfully published!');
                form.reset();
                fileNameText.innerText = "Click to select product image";
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Publish to Marketplace";
            }
        };
    </script>
</body>
</html>
