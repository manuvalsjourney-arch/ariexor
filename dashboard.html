<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --indigo: #6366f1;
            --indigo-light: #818cf8;
            --indigo-dark: #4f46e5;
            --surface: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.08);
            --border-focus: rgba(99,102,241,0.6);
        }

        * { box-sizing: border-box; }

        body {
            background: #0b0b14;
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(99,102,241,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            z-index: 1;
        }

        .field-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: 1rem 1.1rem;
            border-radius: 1rem;
            outline: none;
            color: #fff;
            font-size: 0.95rem;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            margin-top: 0.35rem;
        }
        .field-input::placeholder { color: rgba(255,255,255,0.2); }
        .field-input:focus {
            border-color: var(--border-focus);
            background: rgba(99,102,241,0.06);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        textarea.field-input { height: 130px; resize: vertical; }

        .file-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            min-height: 100px;
            border: 1.5px dashed rgba(99,102,241,0.3);
            border-radius: 1rem;
            background: rgba(99,102,241,0.03);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            padding: 1.2rem;
            text-align: center;
            margin-top: 0.35rem;
        }
        .file-label:hover {
            border-color: rgba(99,102,241,0.6);
            background: rgba(99,102,241,0.07);
        }
        .file-label .file-icon { font-size: 1.6rem; opacity: 0.5; }
        .file-label .file-hint { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-top: 0.2rem; }
        .file-label .file-name { font-size: 0.8rem; color: var(--indigo-light); font-weight: 600; word-break: break-all; }
        input[type="file"] { display: none; }

        .field-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: rgba(255,255,255,0.35);
            margin-left: 2px;
            display: block;
        }
        .field-label.accent { color: rgba(129,140,248,0.75); }

        /* ── Remix toggle ───────────────────────────────────────────────── */
        .remix-toggle-wrap {
            display: flex;
            align-items: flex-start;
            gap: 0.85rem;
            background: rgba(168,85,247,0.06);
            border: 1px solid rgba(168,85,247,0.18);
            border-radius: 1rem;
            padding: 1rem 1.1rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            user-select: none;
        }
        .remix-toggle-wrap:hover {
            background: rgba(168,85,247,0.11);
            border-color: rgba(168,85,247,0.35);
        }
        /* Hide the native checkbox; we draw our own box */
        .remix-toggle-wrap input[type="checkbox"] {
            display: none;
        }
        .remix-checkbox-box {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 1.5px solid rgba(168,85,247,0.45);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
            transition: background 0.18s, border-color 0.18s;
        }
        .remix-checkbox-box svg {
            opacity: 0;
            transition: opacity 0.15s;
        }
        #remixLicenseCheck:checked ~ * .remix-checkbox-box,
        .remix-toggle-wrap.checked .remix-checkbox-box {
            background: #a855f7;
            border-color: #a855f7;
        }
        #remixLicenseCheck:checked ~ * .remix-checkbox-box svg,
        .remix-toggle-wrap.checked .remix-checkbox-box svg {
            opacity: 1;
        }
        .remix-toggle-label-text {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .remix-toggle-label-text strong {
            font-size: 0.85rem;
            font-weight: 700;
            color: #c084fc;
        }
        .remix-toggle-label-text span {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.35);
            line-height: 1.5;
        }

        #submitBtn {
            width: 100%;
            background: var(--indigo);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            padding: 1.1rem;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 8px 32px rgba(99,102,241,0.25);
            letter-spacing: 0.02em;
        }
        #submitBtn:hover:not(:disabled) {
            background: #5558e8;
            transform: translateY(-1px);
            box-shadow: 0 12px 40px rgba(99,102,241,0.35);
        }
        #submitBtn:active:not(:disabled) { transform: scale(0.985); }
        #submitBtn:disabled { opacity: 0.55; cursor: not-allowed; }

        #progressWrap {
            display: none;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
            overflow: hidden;
            margin-top: 0.75rem;
        }
        #progressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--indigo), var(--indigo-light));
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a1a2e;
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.85rem 1.4rem;
            font-size: 0.85rem;
            font-weight: 500;
            max-width: 420px;
            width: calc(100% - 2rem);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 999;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            word-break: break-word;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.success { border-color: rgba(52,211,153,0.3); }
        #toast.error   { border-color: rgba(239,68,68,0.3); }
        #toast.warning { border-color: rgba(251,191,36,0.3); }
        #toast .toast-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
        #toast .toast-msg  { line-height: 1.5; color: rgba(255,255,255,0.85); }

        #authBadge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.72rem;
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            font-weight: 600;
        }
        #authBadge.checking   { background: rgba(251,191,36,0.1);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
        #authBadge.signed-in  { background: rgba(52,211,153,0.1);  color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
        #authBadge.signed-out { background: rgba(239,68,68,0.1);   color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
        #authBadge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        footer { position: relative; z-index: 1; }
    </style>
</head>
<body class="p-6">

    <div id="toast">
        <span class="toast-icon" id="toastIcon"></span>
        <span class="toast-msg"  id="toastMsg"></span>
    </div>

    <div class="w-full max-w-2xl glass-card p-10 rounded-[2.5rem] mb-8 mt-8">

        <div class="flex flex-wrap justify-between items-start gap-4 mb-8">
            <div>
                <h1 id="pageTitle" class="text-3xl font-extrabold tracking-tighter text-indigo-500">List New Product</h1>
                <p class="text-slate-500 text-xs mt-1">Fill in the details below to publish your digital asset.</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <a href="index.html" class="text-slate-400 hover:text-white text-sm transition-colors">← Back to Shop</a>
                <span id="authBadge" class="checking"><span class="dot"></span> Checking…</span>
            </div>
        </div>

        <!--
            novalidate: we do all validation manually in JS so the browser
            never blocks submit because a file input is "missing" in edit mode.
        -->
        <form id="productForm" class="space-y-6" novalidate>

            <div>
                <label class="field-label" for="title">Product Title</label>
                <input type="text" id="title" placeholder="e.g. Midnight Sky Digital Planner" class="field-input">
            </div>

            <div>
                <label class="field-label" for="description">Description</label>
                <textarea id="description" placeholder="Describe your asset in detail…" class="field-input"></textarea>
            </div>

            <div>
                <label class="field-label" for="price">Price (USD)</label>
                <input type="number" id="price" step="0.01" min="0" placeholder="9.99" class="field-input">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <div>
                    <label class="field-label accent">Preview Image</label>
                    <label for="imageInput" class="file-label" id="imageDrop">
                        <span class="file-icon">🖼️</span>
                        <span class="text-slate-400 text-xs font-semibold">Click to upload</span>
                        <span class="file-hint">PNG, JPG, WEBP — max 10 MB</span>
                        <span class="file-name" id="imageFileName"></span>
                    </label>
                    <!-- No required attr — validated in JS -->
                    <input type="file" id="imageInput" accept="image/*">
                </div>

                <div>
                    <label class="field-label accent">Digital Asset</label>
                    <label for="pdfInput" class="file-label" id="assetDrop">
                        <span class="file-icon">📦</span>
                        <span class="text-slate-400 text-xs font-semibold">Click to upload</span>
                        <span class="file-hint">PDF, ZIP, AEP, FIG, MP4 & more</span>
                        <span class="file-name" id="assetFileName"></span>
                    </label>
                    <!-- No required attr — validated in JS -->
                    <input type="file" id="pdfInput" accept=".pdf,.zip,.rar,.png,.jpg,.jpeg,.prproj,.aep,.mp4,.mov,.drt,.fig,.otf,.ttf,.json,.html,.css,.js,.csv,.xlsx">
                </div>
            </div>

            <!-- ── Remix & Resell licence toggle ─────────────────────────── -->
            <!--
                The real checkbox is hidden; clicking anywhere on .remix-toggle-wrap
                toggles it. JS reads #remixLicenseCheck.checked at submit time and
                writes license_type: 'remix' | 'personal' into the payload.
            -->
            <div>
                <label class="field-label" style="margin-bottom:0.5rem;">Licensing</label>
                <label class="remix-toggle-wrap" id="remixToggleWrap" for="remixLicenseCheck">
                    <input type="checkbox" id="remixLicenseCheck">
                    <div class="remix-checkbox-box">
                        <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                            <polyline points="1,4.5 4,7.5 10,1" stroke="white" stroke-width="1.8"
                                      stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="remix-toggle-label-text">
                        <strong>Allow others to Remix &amp; Resell this asset</strong>
                        <span>Buyers can clone this listing to their own dashboard and sell it independently. You keep your original listing.</span>
                    </div>
                </label>
            </div>

            <button type="submit" id="submitBtn">Publish Product</button>
            <div id="progressWrap"><div id="progressBar"></div></div>

        </form>
    </div>

    <footer class="py-12 border-t border-white/5 w-full mt-4">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-slate-500 text-[10px] tracking-[0.2em] uppercase font-medium">
                &copy; 2026 ariexo — All Rights Reserved
            </div>
            <div class="flex space-x-8 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <a href="legal.html#privacy"  class="hover:text-white transition-all duration-300">Privacy Policy</a>
                <a href="legal.html#terms"    class="hover:text-white transition-all duration-300">Terms of Service</a>
                <a href="legal.html#refunds"  class="hover:text-white transition-all duration-300">Refund Policy</a>
                <a href="mailto:support@ariexor.com" class="text-indigo-400 hover:text-indigo-300 transition-all duration-300 underline decoration-indigo-500/30 underline-offset-4">Support</a>
            </div>
        </div>
    </footer>

<script>
// ─── Supabase Init ────────────────────────────────────────────────────────────
const sb = supabase.createClient(
    'https://jiuzebbrjbqkoovfrbvp.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppdXplYmJyamJxa29vdmZyYnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDc0NzYsImV4cCI6MjA5MzAyMzQ3Nn0.EWf2226D-wJZE25MLzqOToC-1LFu3o7vb0Sqi0q8FSc'
);

let currentUser   = null;

// Submission lock — prevents double-inserts from rapid clicks or accidental
// re-submissions. Set to true the moment the handler starts real work;
// reset to false only on failure so the user can retry without refreshing.
let isSubmitting  = false;

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'info') {
    const toast = document.getElementById('toast');
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    document.getElementById('toastIcon').textContent = icons[type] ?? 'ℹ️';
    document.getElementById('toastMsg').textContent  = msg;
    toast.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.className = ''; }, type === 'error' ? 8000 : 4000);
}

// ─── Progress ─────────────────────────────────────────────────────────────────
function setProgress(pct) {
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('progressBar').style.width    = pct + '%';
}
function hideProgress() {
    setTimeout(() => {
        document.getElementById('progressWrap').style.display = 'none';
        document.getElementById('progressBar').style.width    = '0%';
    }, 600);
}

// ─── Auth badge ───────────────────────────────────────────────────────────────
async function updateAuthBadge() {
    const badge = document.getElementById('authBadge');
    try {
        const result = await Promise.race([
            sb.auth.getUser(),
            new Promise((_, reject) =>
                setTimeout(() => reject(new Error('Connection Timeout')), 5000)
            )
        ]);
        const { data: { user }, error } = result;
        if (error) throw error;
        if (user) {
            currentUser = user;
            badge.className = 'signed-in';
            badge.innerHTML = `<span class="dot"></span> ${user.email ?? 'Signed in'}`;
        } else {
            badge.className = 'signed-out';
            badge.innerHTML = `<span class="dot"></span> Not signed in`;
            showToast('Please sign in to access the dashboard.', 'warning');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        }
    } catch (err) {
        console.error('[ariexo auth]', err);
        const isTimeout = err.message === 'Connection Timeout';
        badge.className = 'signed-out';
        badge.innerHTML = `<span class="dot"></span> ${isTimeout ? '⏱ Connection Timeout' : 'Auth Error'}`;
        showToast(
            isTimeout
                ? 'Connection timed out. Check your internet and try again.'
                : 'Authentication error: ' + err.message,
            'error'
        );
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
    }
}
updateAuthBadge();

// ─── Remix toggle — keep .checked class in sync for CSS ──────────────────────
const remixCheckbox  = document.getElementById('remixLicenseCheck');
const remixWrap      = document.getElementById('remixToggleWrap');

remixCheckbox.addEventListener('change', () => {
    remixWrap.classList.toggle('checked', remixCheckbox.checked);
});

// ─── File input labels ────────────────────────────────────────────────────────
document.getElementById('imageInput').addEventListener('change', function () {
    document.getElementById('imageFileName').textContent = this.files[0]?.name ?? '';
});
document.getElementById('pdfInput').addEventListener('change', function () {
    document.getElementById('assetFileName').textContent = this.files[0]?.name ?? '';
});

// ─── Edit mode setup ──────────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const editId    = urlParams.get('edit');
const form      = document.getElementById('productForm');
const btn       = document.getElementById('submitBtn');

if (editId) {
    loadProductData(editId);
}

async function loadProductData(id) {
    document.getElementById('pageTitle').textContent = 'Edit Product Asset';
    btn.textContent = 'Save Changes';

    const { data, error } = await sb
        .from('product_details')
        .select('*')
        .eq('id', id)
        .single();

    if (error) {
        showToast('Could not load product: ' + error.message, 'error');
        return;
    }

    if (data) {
        document.getElementById('title').value       = data.title       ?? '';
        document.getElementById('description').value = data.description ?? '';
        document.getElementById('price').value       = data.price       ?? '';

        // Pre-populate the remix toggle from the saved license_type
        const isRemix = data.license_type === 'remix';
        remixCheckbox.checked = isRemix;
        remixWrap.classList.toggle('checked', isRemix);

        // Show existing file names so the seller knows what's already saved
        if (data.image_url) {
            document.getElementById('imageFileName').textContent =
                '✓ Current: ' + data.image_url.split('/').pop().split('?')[0];
        }
        if (data.asset_url) {
            document.getElementById('assetFileName').textContent =
                '✓ Current: ' + data.asset_url.split('/').pop().split('?')[0];
        }
    }
}

// ─── Form submit ──────────────────────────────────────────────────────────────
form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const defaultBtnText = editId ? 'Save Changes' : 'Publish Product';
    const imgFile = document.getElementById('imageInput').files[0];
    const pdfFile = document.getElementById('pdfInput').files[0];

    // ── Manual validation (replaces browser 'required') ──────────────────────
    // On a NEW listing, both files are mandatory.
    // On EDIT, files are optional — only upload if the seller chose a new one.
    if (!editId) {
        if (!document.getElementById('title').value.trim()) {
            showToast('Please enter a product title.', 'warning'); return;
        }
        if (!imgFile) {
            showToast('Please select a preview image.', 'warning'); return;
        }
        if (!pdfFile) {
            showToast('Please select a digital asset file.', 'warning'); return;
        }
    }

    btn.textContent = 'Processing…';
    btn.disabled    = true;
    setProgress(5);

    const ts = Date.now();

    try {
        // ── 1. Verify session ─────────────────────────────────────────────────
        if (!currentUser) {
            const { data: { user }, error: authError } = await sb.auth.getUser();
            if (authError || !user) {
                throw new Error('You must be signed in. ' + (authError?.message ?? 'No session.'));
            }
            currentUser = user;
        }

        setProgress(15);

        // ── 2. Build payload (only fields being changed) ──────────────────────
        // license_type is always written on every save — 'remix' if checked,
        // 'personal' if unchecked. This ensures the value is never left null.
        const licenseType = document.getElementById('remixLicenseCheck').checked
            ? 'remix'
            : 'personal';

        const payload = {
            seller_id:    currentUser.id,
            title:        document.getElementById('title').value.trim(),
            description:  document.getElementById('description').value.trim(),
            price:        parseFloat(document.getElementById('price').value),
            license_type: licenseType,
        };

        // ── 3. Upload preview image if a new one was selected ─────────────────
        if (imgFile) {
            btn.textContent = 'Uploading image…';
            const imgPath = `previews/${ts}-${imgFile.name}`;
            const { error: imgErr } = await sb.storage
                .from('product-images')
                .upload(imgPath, imgFile);
            if (imgErr) throw new Error('Image upload failed: ' + imgErr.message);

            const { data: imgData } = sb.storage
                .from('product-images')
                .getPublicUrl(imgPath);

            setProgress(40);

            // Content moderation
            const { data: mod, error: modErr } = await sb.functions.invoke('moderate-image', {
                body: { image_url: imgData.publicUrl }
            });
            if (!modErr && mod?.moderation) {
                const m = mod.moderation;
                if (m.adult === 'VERY_LIKELY' || m.adult === 'LIKELY' || m.violence === 'VERY_LIKELY') {
                    showToast('Upload blocked: Image violates safety guidelines.', 'warning');
                    btn.textContent = defaultBtnText;
                    btn.disabled    = false;
                    hideProgress();
                    return;
                }
            }

            // ✅ Explicitly overwrite image_url with the new public URL
            payload.image_url = imgData.publicUrl;
        }
        // If no new image in edit mode, image_url is omitted → DB keeps old value

        setProgress(60);

        // ── 4. Upload asset file if a new one was selected ────────────────────
        if (pdfFile) {
            btn.textContent = 'Uploading asset…';
            const assetPath = `downloads/${ts}-${pdfFile.name}`;
            const { error: assetErr } = await sb.storage
                .from('user-products')
                .upload(assetPath, pdfFile);
            if (assetErr) throw new Error('Asset upload failed: ' + assetErr.message);

            // ✅ Store BARE PATH only — NOT a public URL.
            //    product-details.html uses createSignedUrl(path, 60, {download:true})
            //    on the private bucket, which needs just: "downloads/file.zip"
            payload.asset_url = assetPath;
        }
        // If no new asset in edit mode, asset_url is omitted → DB keeps old value

        setProgress(80);

        // ── 5. Write to database ──────────────────────────────────────────────
        btn.textContent = editId ? 'Saving…' : 'Publishing…';

        if (editId) {
            const { error: updateErr } = await sb
                .from('product_details')
                .update(payload)
                .eq('id', editId);

            if (updateErr) {
                // ✅ Alert with the raw error code so you can see it immediately
                const detail = [
                    `Code: ${updateErr.code}`,
                    `Message: ${updateErr.message}`,
                    updateErr.hint ? `Hint: ${updateErr.hint}` : '',
                    updateErr.code === '42501'
                        ? 'RLS block — check UPDATE policy uses auth.uid() = seller_id'
                        : ''
                ].filter(Boolean).join('\n');
                alert('❌ Save failed:\n\n' + detail);
                throw new Error(`Save failed (${updateErr.code}): ${updateErr.message}`);
            }

            setProgress(100);
            showToast('Changes saved successfully!', 'success');

        } else {
            const { error: insertErr } = await sb
                .from('product_details')
                .insert([payload]);

            if (insertErr) {
                const detail = [
                    `Code: ${insertErr.code}`,
                    `Message: ${insertErr.message}`,
                    insertErr.hint ? `Hint: ${insertErr.hint}` : '',
                    insertErr.code === '42501'
                        ? 'RLS block — check INSERT policy uses auth.uid() = seller_id'
                        : ''
                ].filter(Boolean).join('\n');
                alert('❌ Publish failed:\n\n' + detail);
                throw new Error(`Publish failed (${insertErr.code}): ${insertErr.message}`);
            }

            setProgress(100);
            showToast('Boom! Your product is live. 🚀', 'success');
        }

        hideProgress();
        setTimeout(() => { window.location.href = 'analytics.html'; }, 1800);

    } catch (err) {
        hideProgress();
        console.error('[ariexo dashboard]', err);
        showToast(err.message, 'error');
        btn.textContent = defaultBtnText;
        btn.disabled    = false;
    }
});
</script>
</body>
</html>
