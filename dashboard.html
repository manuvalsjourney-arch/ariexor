<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ariexo | Seller Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --electric-blue: #007AFF; --deep-charcoal: #0a0a0a; }
    body { font-family: 'Inter', sans-serif; background-color: var(--deep-charcoal); }
  </style>
</head>
<body class="text-white min-h-screen">

  <nav class="border-b border-gray-800 p-6 bg-black/50 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="/" class="text-2xl font-bold text-blue-500 tracking-tighter">ariexo</a>
      <div class="flex items-center gap-6">
        <span id="userEmail" class="text-sm text-gray-400"></span>
        <button onclick="handleLogout()" class="text-sm font-medium hover:text-red-500 transition-colors">Logout</button>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-12">
    <div class="mb-10 text-center">
        <h1 class="text-3xl font-bold mb-2">Seller Dashboard</h1>
        <p class="text-gray-400">Upload your digital products to the ariexo marketplace.</p>
    </div>

    <div class="bg-gray-900/50 border border-gray-800 rounded-3xl p-8 backdrop-blur-sm">
      <h2 class="text-xl font-semibold mb-6">Create New Listing</h2>
      
      <form id="productForm" class="space-y-6">
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Product Title</label>
                <input id="title" type="text" required class="w-full rounded-xl border border-gray-700 bg-black px-4 py-3 text-white outline-none focus:border-blue-500" placeholder="e.g. Cyberpunk Asset Pack">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Price ($)</label>
                <input id="price" type="number" step="0.01" required class="w-full rounded-xl border border-gray-700 bg-black px-4 py-3 text-white outline-none focus:border-blue-500" placeholder="19.99">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Description</label>
            <textarea id="description" required rows="4" class="w-full rounded-xl border border-gray-700 bg-black px-4 py-3 text-white outline-none focus:border-blue-500" placeholder="What is included in this digital product?"></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Product Image (Upload File)</label>
            <input id="image_file" type="file" accept="image/*" required class="w-full text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer">
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl px-4 py-4 transition-all transform hover:scale-[1.01]">
          Publish to Marketplace
        </button>
      </form>
    </div>
  </main>

  <script>
    const supabaseUrl = 'https://qtewpjdnnjgvfgllgryy.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function init() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) {
            window.location.href = '/login';
        } else {
            document.getElementById('userEmail').innerText = user.email;
        }
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.innerText = "Uploading Image...";
      btn.disabled = true;

      // 1. Get the file from input
      const fileInput = document.getElementById('image_file');
      const file = fileInput.files[0];
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}.${fileExt}`;

      // 2. Upload to "product-images" bucket
      const { data: uploadData, error: uploadError } = await _supabase.storage
        .from('product-images')
        .upload(fileName, file);

      if (uploadError) {
        alert("Upload failed: " + uploadError.message);
        btn.innerText = "Publish to Marketplace";
        btn.disabled = false;
        return;
      }

      // 3. Get Public URL
      const { data: { publicUrl } } = _supabase.storage
        .from('product-images')
        .getPublicUrl(fileName);

      // 4. Save to "Product Details" table
      const { data: { user } } = await _supabase.auth.getUser();
      const { error: dbError } = await _supabase
        .from('Product Details')
        .insert([{ 
            Title: document.getElementById('title').value,
            Description: document.getElementById('description').value,
            Price: parseFloat(document.getElementById('price').value),
            Image_url: publicUrl,
            Seller_id: user.id
        }]);

      if (dbError) {
        alert("Database error: " + dbError.message);
        btn.innerText = "Publish to Marketplace";
        btn.disabled = false;
      } else {
        alert("Success! Your product is now live on ariexo.");
        document.getElementById('productForm').reset();
        btn.innerText = "Publish to Marketplace";
        btn.disabled = false;
      }
    });

    async function handleLogout() {
        await _supabase.auth.signOut();
        window.location.href = '/login';
    }

    init();
  </script>
</body>
</html>
