<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: #0b0b14; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-2xl glass-card p-10 rounded-[2.5rem] mb-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tighter text-indigo-500">List New Product</h1>
            <a href="index.html" class="text-slate-400 hover:text-white text-sm transition-colors">← Back to Shop</a>
        </div>

        <form id="productForm" class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Product Title</label>
                <input type="text" id="title" placeholder="e.g. Midnight Sky Digital Planner" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500 transition-all mt-1" required>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Description</label>
                <textarea id="description" placeholder="Describe your asset..." class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500 h-32 transition-all mt-1" required></textarea>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Price ($)</label>
                <input type="number" id="price" step="0.01" placeholder="9.99" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500 transition-all mt-1" required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest ml-1">Upload Preview Image</label>
                    <input type="file" id="imageInput" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 hover:file:bg-indigo-500/20 mt-2" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest ml-1">Upload Asset</label>
                    <input type="file" id="pdfInput" accept=".pdf,.zip,.rar,.png,.jpg,.jpeg,.prproj,.aep,.mp4,.mov,.drt,.fig,.otf,.ttf,.json,.html,.css,.js,.csv,.xlsx" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 hover:file:bg-indigo-500/20 mt-2" required>
                </div>
            </div>

            <div class="space-y-4 py-6 border-t border-white/5">
                <div class="flex items-start space-x-3">
                    <input id="legal-terms" type="checkbox" required class="mt-1 h-4 w-4 rounded border-white/10 bg-white/5 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                    <div class="text-xs">
                        <label for="legal-terms" class="font-medium text-slate-300">I agree to the <a href="#" class="text-indigo-400 underline hover:text-indigo-300">Terms of Service</a> & <a href="legal.html" class="text-indigo-400 underline hover:text-indigo-300">Privacy Policy</a></label>
                        <p class="text-slate-500 mt-0.5">I confirm I own the rights to this asset and it contains no malicious content.</p>
                    </div>
                </div>

                <div class="flex items-start space-x-3">
                    <input id="refund-policy" type="checkbox" required class="mt-1 h-4 w-4 rounded border-white/10 bg-white/5 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                    <div class="text-xs">
                        <label for="refund-policy" class="font-medium text-slate-300 tracking-wide">Acknowledge <ahref="legal.html" class="text-indigo-400 underline hover:text-indigo-300">Refund Policy</a></label>
                        <p class="text-slate-500 mt-0.5">I understand that due to the nature of digital goods, all sales are final.</p>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-bold text-lg transition-all transform hover:scale-[1.01] active:scale-95 shadow-xl shadow-indigo-500/20">
                Publish Product
            </button>
        </form>
    </div>
<footer class="py-12 border-t border-white/5 mt-20">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="text-slate-500 text-[10px] tracking-[0.2em] uppercase font-medium">
            &copy; 2026 ariexo — All Rights Reserved
        </div>

        <div class="flex space-x-8 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
            <a href="legal.html#privacy" class="hover:text-white transition-all duration-300">Privacy Policy</a>
            <a href="legal.html#terms" class="hover:text-white transition-all duration-300">Terms of Service</a>
            <a href="legal.html#refunds" class="hover:text-white transition-all duration-300">Refund Policy</a>
            <a href="mailto:support@ariexor.com" class="text-indigo-400 hover:text-indigo-300 transition-all duration-300 underline decoration-indigo-500/30 underline-offset-4">Support</a>
        </div>
    </div>
</footer>


<script>
    // Supabase config (Keeping your current credentials)
    const sb = supabase.createClient(
        'https://jiuzebbrjbqkoovfrbvp.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppdXplYmJyamJxa29vdmZyYnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDc0NzYsImV4cCI6MjA5MzAyMzQ3Nn0.EWf2226D-wJZE25MLzqOToC-1LFu3o7vb0Sqi0q8FSc'
    );

    const urlParams = new URLSearchParams(window.location.search);
    const editId = urlParams.get('edit');
    const form = document.getElementById('productForm');
    const btn = document.getElementById('submitBtn');
    const titleHeader = document.querySelector('h1');

    if (editId) {
        loadProductData(editId);
    }

    async function loadProductData(id) {
        titleHeader.innerText = "Edit Product Asset";
        btn.innerText = "Save Changes";
        
        const { data, error } = await sb
            .from('product_details')
            .select('*')
            .eq('id', id)
            .single();

        if (data) {
            document.getElementById('title').value = data.title;
            document.getElementById('description').value = data.description;
            document.getElementById('price').value = data.price;
            document.getElementById('imageInput').required = false;
            document.getElementById('pdfInput').required = false;
        }
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        btn.innerText = "Processing...";
        btn.disabled = true;

        const imgFile = document.getElementById('imageInput').files[0];
        const pdfFile = document.getElementById('pdfInput').files[0];
        const time = Date.now();

        try {
            let updatePayload = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                price: parseFloat(document.getElementById('price').value)
            };

            if (imgFile) {
                const imgPath = `previews/${time}-${imgFile.name}`;
                await sb.storage.from('product-images').upload(imgPath, imgFile);
                const { data: imgData } = sb.storage.from('product-images').getPublicUrl(imgPath);
                
                const { data: moderation, error: modError } = await sb.functions.invoke('moderate-image', {
                    body: { image_url: imgData.publicUrl }
                });

                if (!modError && moderation && moderation.moderation) {
                    const m = moderation.moderation;
                    if (m.adult === 'VERY_LIKELY' || m.adult === 'LIKELY' || m.violence === 'VERY_LIKELY') {
                        alert("🚨 Upload blocked: This image violates our safety guidelines.");
                        btn.innerText = "Publish Product";
                        btn.disabled = false;
                        return;
                    }
                }

                updatePayload.image_url = imgData.publicUrl;
            }

            if (pdfFile) {
                const pdfPath = `downloads/${time}-${pdfFile.name}`;
                await sb.storage.from('user-products').upload(pdfPath, pdfFile);
                const { data: pdfData } = sb.storage.from('user-products').getPublicUrl(pdfPath);
                updatePayload.file_url = pdfData.publicUrl;
            }

            if (editId) {
                const { error } = await sb.from('product_details').update(updatePayload).eq('id', editId);
                if (error) throw error;
                alert("Changes saved successfully!");
            } else {
                updatePayload.seller_id = 'e0bed6bb-f967-436b-9cb2-76c78a5538d5'; 
                const { error } = await sb.from('product_details').insert([updatePayload]);
                if (error) throw error;
                alert("Boom! Your product is live.");
            }

            window.location.href = 'analytics.html';

        } catch (err) {
            alert("Action failed: " + err.message);
            btn.innerText = editId ? "Save Changes" : "Publish Product";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
