<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0b0b14] text-white flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-xl bg-slate-900/50 p-10 rounded-[2.5rem] border border-white/5 backdrop-blur-xl">
        <h1 class="text-3xl font-bold mb-8">List New Asset</h1>
        <form id="productForm" class="space-y-6">
            <input type="text" id="title" required placeholder="Asset Title" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 focus:border-indigo-500 outline-none">
            <input type="number" id="price" required step="0.01" placeholder="Price (USD)" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 focus:border-indigo-500 outline-none">
            <textarea id="description" rows="3" required placeholder="Asset Description" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 focus:border-indigo-500 outline-none"></textarea>
            
            <div class="border-2 border-dashed border-white/10 rounded-2xl p-8 text-center cursor-pointer hover:border-indigo-500 transition-colors relative">
                <p id="fileName" class="text-slate-400">Click to upload product image</p>
                <input type="file" id="imageInput" accept="image/*" required class="absolute inset-0 opacity-0 cursor-pointer">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all">Publish Listing</button>
        </form>
    </div>

    <script>
        const sb = supabase.createClient('https://qtewpjdnnjgvfgllgryy.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU');

        // Check login on load
        async function checkAuth() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) window.location.href = 'login.html';
        }
        checkAuth();

        document.getElementById('imageInput').onchange = (e) => {
            if(e.target.files[0]) document.getElementById('fileName').innerText = e.target.files[0].name;
        };

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Processing...";

            const { data: { user } } = await sb.auth.getUser();
            const file = document.getElementById('imageInput').files[0];
            const filePath = `products/${Date.now()}-${file.name}`;

            // Upload image
            const { error: upErr } = await sb.storage.from('product-images').upload(filePath, file);
            if (upErr) { alert(upErr.message); btn.disabled = false; return; }

            const { data: urlData } = sb.storage.from('product-images').getPublicUrl(filePath);

            // Save product with dynamic seller_id
            const { error } = await sb.from('product_details').insert([{
                title: document.getElementById('title').value,
                price: parseFloat(document.getElementById('price').value),
                description: document.getElementById('description').value,
                image_url: urlData.publicUrl,
                seller_id: user.id
            }]);

            if (error) alert(error.message);
            else window.location.href = 'analytics.html';
        };
    </script>
</body>
</html>
