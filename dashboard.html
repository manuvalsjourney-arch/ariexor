<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | Digital Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1a1a2e, #0f0f1a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* Abstract Background Shapes */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-glass:focus {
            border-color: #818cf8;
            box-shadow: 0 0 15px rgba(129, 140, 248, 0.2);
            outline: none;
        }

        .neon-glow:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
            transform: translateY(-2px);
        }

        .step-active {
            color: #818cf8;
            border-bottom: 2px solid #818cf8;
        }
    </style>
</head>
<body>

    <div class="blob top-0 -left-20"></div>
    <div class="blob bottom-0 -right-20" style="background: linear-gradient(135deg, rgba(45, 212, 191, 0.15), rgba(99, 102, 241, 0.15));"></div>

    <main class="w-full max-w-2xl px-6 py-12">
        <div class="glass-card rounded-3xl p-8 md:p-10 relative overflow-hidden">
            
            <div class="mb-10 text-center">
                <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-indigo-200 to-purple-400 mb-2">
                    Add New Product
                </h1>
                <p class="text-slate-400 text-sm">List your digital asset on the global marketplace</p>
            </div>

            <div class="flex justify-between mb-10 px-4">
                <div class="flex flex-col items-center gap-2 group cursor-pointer">
                    <span class="text-xs font-semibold uppercase tracking-widest text-indigo-400">Details</span>
                    <div class="h-1 w-16 bg-indigo-500 rounded-full shadow-[0_0_10px_#6366f1]"></div>
                </div>
                <div class="flex flex-col items-center gap-2 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
                    <span class="text-xs font-semibold uppercase tracking-widest">Media</span>
                    <div class="h-1 w-16 bg-slate-600 rounded-full"></div>
                </div>
                <div class="flex flex-col items-center gap-2 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
                    <span class="text-xs font-semibold uppercase tracking-widest">Publish</span>
                    <div class="h-1 w-16 bg-slate-600 rounded-full"></div>
                </div>
            </div>

            <form class="space-y-6">
                <div class="relative group">
                    <label class="block text-xs font-medium text-slate-400 mb-2 ml-1">PRODUCT TITLE</label>
                    <div class="relative">
                        <i data-lucide="package" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-indigo-400 transition-colors"></i>
                        <input type="text" placeholder="e.g. Holographic UI Kit" 
                               class="input-glass w-full py-4 pl-12 pr-4 rounded-xl text-white placeholder-slate-600">
                    </div>
                    <p class="text-[10px] text-slate-500 mt-1.5 ml-1">Keep it catchy and descriptive.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="group">
                        <label class="block text-xs font-medium text-slate-400 mb-2 ml-1">CATEGORY</label>
                        <div class="relative">
                            <i data-lucide="layers" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-teal-400 transition-colors"></i>
                            <select class="input-glass w-full py-4 pl-12 pr-4 rounded-xl text-white appearance-none cursor-pointer">
                                <option>UI Assets</option>
                                <option>3D Models</option>
                                <option>Code Plugins</option>
                            </select>
                        </div>
                    </div>
                    <div class="group">
                        <label class="block text-xs font-medium text-slate-400 mb-2 ml-1">PRICE (USD)</label>
                        <div class="relative">
                            <i data-lucide="dollar-sign" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within:text-purple-400 transition-colors"></i>
                            <input type="number" placeholder="0.00" 
                                   class="input-glass w-full py-4 pl-12 pr-4 rounded-xl text-white placeholder-slate-600">
                        </div>
                    </div>
                </div>

                <div class="group">
                    <label class="block text-xs font-medium text-slate-400 mb-2 ml-1">DESCRIPTION</label>
                    <textarea rows="4" placeholder="Tell the world about your product..." 
                              class="input-glass w-full p-4 rounded-xl text-white placeholder-slate-600 resize-none"></textarea>
                </div>

                <div class="group">
                    <label class="block text-xs font-medium text-slate-400 mb-2 ml-1">PRODUCT MEDIA</label>
                    <div class="border-2 border-dashed border-slate-700 hover:border-indigo-500/50 hover:bg-indigo-500/5 transition-all rounded-2xl p-8 text-center cursor-pointer relative overflow-hidden group">
                        <i data-lucide="upload-cloud" class="w-10 h-10 text-slate-500 mx-auto mb-3 group-hover:text-indigo-400 transition-colors"></i>
                        <p class="text-sm text-slate-300">Drag and drop your asset preview</p>
                        <p class="text-xs text-slate-500 mt-1">PNG, JPG or MP4 (Max 50MB)</p>
                        <input type="file" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                </div>

                <button type="submit" class="neon-glow w-full bg-gradient-to-r from-indigo-600 to-purple-600 py-4 rounded-xl font-bold text-white tracking-wide transition-all duration-300 flex items-center justify-center gap-2 mt-4 shadow-lg shadow-indigo-500/20">
                    Publish to Marketplace
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
        
        <p class="text-center text-slate-500 text-xs mt-8">
            Need help? Check our <a href="#" class="text-indigo-400 hover:underline">Seller Guidelines</a>
        </p>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
