<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --indigo: #6366f1;
            --indigo-light: #818cf8;
            --indigo-dark: #4f46e5;
            --surface: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.08);
            --border-focus: rgba(99,102,241,0.6);
        }

        * { box-sizing: border-box; }

        body {
            background: #0b0b14;
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(99,102,241,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            z-index: 1;
        }

        /* Form inputs */
        .field-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: 1rem 1.1rem;
            border-radius: 1rem;
            outline: none;
            color: #fff;
            font-size: 0.95rem;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            margin-top: 0.35rem;
        }
        .field-input::placeholder { color: rgba(255,255,255,0.2); }
        .field-input:focus {
            border-color: var(--border-focus);
            background: rgba(99,102,241,0.06);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        textarea.field-input { height: 130px; resize: vertical; }

        /* File input */
        .file-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            min-height: 100px;
            border: 1.5px dashed rgba(99,102,241,0.3);
            border-radius: 1rem;
            background: rgba(99,102,241,0.03);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            padding: 1.2rem;
            text-align: center;
            margin-top: 0.35rem;
        }
        .file-label:hover {
            border-color: rgba(99,102,241,0.6);
            background: rgba(99,102,241,0.07);
        }
        .file-label .file-icon { font-size: 1.6rem; opacity: 0.5; }
        .file-label .file-hint { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-top: 0.2rem; }
        .file-label .file-name { font-size: 0.8rem; color: var(--indigo-light); font-weight: 600; word-break: break-all; }
        input[type="file"] { display: none; }

        /* Field label */
        .field-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: rgba(255,255,255,0.35);
            margin-left: 2px;
            display: block;
        }
        .field-label.accent { color: rgba(129,140,248,0.75); }

        /* Submit button */
        #submitBtn {
            width: 100%;
            background: var(--indigo);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            padding: 1.1rem;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 8px 32px rgba(99,102,241,0.25);
            letter-spacing: 0.02em;
        }
        #submitBtn:hover:not(:disabled) {
            background: #5558e8;
            transform: translateY(-1px);
            box-shadow: 0 12px 40px rgba(99,102,241,0.35);
        }
        #submitBtn:active:not(:disabled) { transform: scale(0.985); }
        #submitBtn:disabled { opacity: 0.55; cursor: not-allowed; }

        /* Progress bar */
        #progressWrap {
            display: none;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
            overflow: hidden;
            margin-top: 0.75rem;
        }
        #progressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--indigo), var(--indigo-light));
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a1a2e;
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.85rem 1.4rem;
            font-size: 0.85rem;
            font-weight: 500;
            max-width: 420px;
            width: calc(100% - 2rem);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 999;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            word-break: break-word;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.success { border-color: rgba(52,211,153,0.3); }
        #toast.error   { border-color: rgba(239,68,68,0.3); }
        #toast.warning { border-color: rgba(251,191,36,0.3); }
        #toast .toast-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
        #toast .toast-msg  { line-height: 1.5; color: rgba(255,255,255,0.85); }

        /* Auth badge */
        #authBadge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.72rem;
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            font-weight: 600;
        }
        #authBadge.checking  { background: rgba(251,191,36,0.1);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
        #authBadge.signed-in  { background: rgba(52,211,153,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
        #authBadge.signed-out { background: rgba(239,68,68,0.1);  color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
        #authBadge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        /* Footer */
        footer { position: relative; z-index: 1; }
    </style>
</head>
<body class="p-6">

    <!-- Toast notification -->
    <div id="toast">
        <span class="toast-icon" id="toastIcon"></span>
        <span class="toast-msg" id="toastMsg"></span>
    </div>

    <div class="w-full max-w-2xl glass-card p-10 rounded-[2.5rem] mb-8 mt-8">

        <!-- Header -->
        <div class="flex flex-wrap justify-between items-start gap-4 mb-8">
            <div>
                <h1 id="pageTitle" class="text-3xl font-extrabold tracking-tighter text-indigo-500">List New Product</h1>
                <p class="text-slate-500 text-xs mt-1">Fill in the details below to publish your digital asset.</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <a href="index.html" class="text-slate-400 hover:text-white text-sm transition-colors">← Back to Shop</a>
                <span id="authBadge" class="checking"><span class="dot"></span> Checking…</span>
            </div>
        </div>

        <form id="productForm" class="space-y-6" novalidate>

            <!-- Title -->
            <div>
                <label class="field-label" for="title">Product Title</label>
                <input type="text" id="title" placeholder="e.g. Midnight Sky Digital Planner" class="field-input" required>
            </div>

            <!-- Description -->
            <div>
                <label class="field-label" for="description">Description</label>
                <textarea id="description" placeholder="Describe your asset in detail — what it is, who it's for, what's included…" class="field-input" required></textarea>
            </div>

            <!-- Price -->
            <div>
                <label class="field-label" for="price">Price (USD)</label>
                <input type="number" id="price" step="0.01" min="0" placeholder="9.99" class="field-input" required>
            </div>

            <!-- File uploads -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <!-- Preview image -->
                <div>
                    <label class="field-label accent">Preview Image</label>
                    <label for="imageInput" class="file-label" id="imageDrop">
                        <span class="file-icon">🖼️</span>
                        <span class="text-slate-400 text-xs font-semibold">Click to upload</span>
                        <span class="file-hint">PNG, JPG, WEBP — max 10 MB</span>
                        <span class="file-name" id="imageFileName"></span>
                    </label>
                    <input type="file" id="imageInput" accept="image/*" required>
                </div>

                <!-- Asset file -->
                <div>
                    <label class="field-label accent">Digital Asset</label>
                    <label for="pdfInput" class="file-label" id="assetDrop">
                        <span class="file-icon">📦</span>
                        <span class="text-slate-400 text-xs font-semibold">Click to upload</span>
                        <span class="file-hint">PDF, ZIP, AEP, FIG, MP4 & more</span>
                        <span class="file-name" id="assetFileName"></span>
                    </label>
                    <input type="file" id="pdfInput" accept=".pdf,.zip,.rar,.png,.jpg,.jpeg,.prproj,.aep,.mp4,.mov,.drt,.fig,.otf,.ttf,.json,.html,.css,.js,.csv,.xlsx" required>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" id="submitBtn">Publish Product</button>
            <div id="progressWrap"><div id="progressBar"></div></div>

        </form>
    </div>

    <!-- Footer -->
    <footer class="py-12 border-t border-white/5 w-full mt-4">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-slate-500 text-[10px] tracking-[0.2em] uppercase font-medium">
                &copy; 2026 ariexo — All Rights Reserved
            </div>
            <div class="flex space-x-8 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <a href="legal.html#privacy"  class="hover:text-white transition-all duration-300">Privacy Policy</a>
                <a href="legal.html#terms"    class="hover:text-white transition-all duration-300">Terms of Service</a>
                <a href="legal.html#refunds"  class="hover:text-white transition-all duration-300">Refund Policy</a>
                <a href="mailto:support@ariexor.com" class="text-indigo-400 hover:text-indigo-300 transition-all duration-300 underline decoration-indigo-500/30 underline-offset-4">Support</a>
            </div>
        </div>
    </footer>

<script>
// ─── Supabase Init ────────────────────────────────────────────────────────────
const sb = supabase.createClient(
    'https://jiuzebbrjbqkoovfrbvp.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppdXplYmJyamJxa29vdmZyYnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDc0NzYsImV4cCI6MjA5MzAyMzQ3Nn0.EWf2226D-wJZE25MLzqOToC-1LFu3o7vb0Sqi0q8FSc'
);

// ─── Cached user (set by updateAuthBadge, used in form submit) ────────────────
let currentUser = null;

// ─── Toast helper ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'info') {
    const toast = document.getElementById('toast');
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    document.getElementById('toastIcon').textContent = icons[type] ?? 'ℹ️';
    document.getElementById('toastMsg').textContent = msg;
    toast.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.className = ''; }, type === 'error' ? 8000 : 4000);
}

// ─── Progress bar helpers ─────────────────────────────────────────────────────
function setProgress(pct) {
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('progressBar').style.width = pct + '%';
}
function hideProgress() {
    setTimeout(() => {
        document.getElementById('progressWrap').style.display = 'none';
        document.getElementById('progressBar').style.width = '0%';
    }, 600);
}

// ─── Auth badge (with timeout + try/catch) ────────────────────────────────────
async function updateAuthBadge() {
    const badge = document.getElementById('authBadge');

    try {
        // Race the Supabase auth call against a 5-second timeout
        const result = await Promise.race([
            sb.auth.getUser(),
            new Promise((_, reject) =>
                setTimeout(() => reject(new Error('Connection Timeout')), 5000)
            )
        ]);

        const { data: { user }, error } = result;

        if (error) throw error;

        if (user) {
            currentUser = user;
            badge.className = 'signed-in';
            badge.innerHTML = `<span class="dot"></span> ${user.email ?? 'Signed in'}`;
        } else {
            // Valid response but no session — redirect to login
            badge.className = 'signed-out';
            badge.innerHTML = `<span class="dot"></span> Not signed in`;
            showToast('Please sign in to access the dashboard.', 'warning');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        }

    } catch (err) {
        console.error('[ariexo auth]', err);
        const isTimeout = err.message === 'Connection Timeout';
        badge.className = 'signed-out';
        badge.innerHTML = `<span class="dot"></span> ${isTimeout ? '⏱ Connection Timeout' : 'Auth Error'}`;
        showToast(
            isTimeout
                ? 'Connection timed out. Check your internet and try again.'
                : 'Authentication error: ' + err.message,
            'error'
        );
        // Redirect to login after showing the message
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
    }
}

// Run auth check immediately on page load
updateAuthBadge();

// ─── File input labels ────────────────────────────────────────────────────────
document.getElementById('imageInput').addEventListener('change', function () {
    document.getElementById('imageFileName').textContent = this.files[0]?.name ?? '';
});
document.getElementById('pdfInput').addEventListener('change', function () {
    document.getElementById('assetFileName').textContent = this.files[0]?.name ?? '';
});

// ─── Edit mode ────────────────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const editId    = urlParams.get('edit');
const form      = document.getElementById('productForm');
const btn       = document.getElementById('submitBtn');

if (editId) {
    loadProductData(editId);
}

async function loadProductData(id) {
    document.getElementById('pageTitle').textContent = 'Edit Product Asset';
    btn.textContent = 'Save Changes';

    const { data, error } = await sb
        .from('product_details')
        .select('*')
        .eq('id', id)
        .single();

    if (error) {
        showToast('Could not load product: ' + error.message, 'error');
        return;
    }

    if (data) {
        document.getElementById('title').value       = data.title       ?? '';
        document.getElementById('description').value = data.description ?? '';
        document.getElementById('price').value       = data.price       ?? '';
        // Files already uploaded — not required on edit unless replacing
        document.getElementById('imageInput').required = false;
        document.getElementById('pdfInput').required   = false;
    }
}

// ─── Form submit ──────────────────────────────────────────────────────────────
form.addEventListener('submit', async (e) => {
    e.preventDefault();

    btn.textContent = 'Processing…';
    btn.disabled    = true;
    setProgress(5);

    const imgFile = document.getElementById('imageInput').files[0];
    const pdfFile = document.getElementById('pdfInput').files[0];
    const ts      = Date.now();

    try {
        // ── 1. Verify authenticated session ──────────────────────────────────
        // Re-check auth in case the session expired since page load
        if (!currentUser) {
            const { data: { user }, error: authError } = await sb.auth.getUser();
            if (authError || !user) {
                throw new Error(
                    'You must be signed in to publish a product. ' +
                    (authError?.message ?? 'No active session found.')
                );
            }
            currentUser = user;
        }

        setProgress(15);

        // ── 2. Build payload ──────────────────────────────────────────────────
        const payload = {
            seller_id:   currentUser.id,
            title:       document.getElementById('title').value.trim(),
            description: document.getElementById('description').value.trim(),
            price:       parseFloat(document.getElementById('price').value)
        };

        // ── 3. Upload preview image ───────────────────────────────────────────
        if (imgFile) {
            const imgPath = `previews/${ts}-${imgFile.name}`;
            const { error: imgUploadErr } = await sb.storage
                .from('product-images')
                .upload(imgPath, imgFile);

            if (imgUploadErr) throw new Error('Image upload failed: ' + imgUploadErr.message);

            const { data: imgData } = sb.storage
                .from('product-images')
                .getPublicUrl(imgPath);

            setProgress(40);

            // Content moderation
            const { data: moderation, error: modError } = await sb.functions.invoke('moderate-image', {
                body: { image_url: imgData.publicUrl }
            });

            if (!modError && moderation?.moderation) {
                const m = moderation.moderation;
                if (m.adult === 'VERY_LIKELY' || m.adult === 'LIKELY' || m.violence === 'VERY_LIKELY') {
                    showToast('Upload blocked: Image violates safety guidelines.', 'warning');
                    btn.textContent = editId ? 'Save Changes' : 'Publish Product';
                    btn.disabled = false;
                    hideProgress();
                    return;
                }
            }

            payload.image_url = imgData.publicUrl;
        }

        setProgress(60);

        // ── 4. Upload asset file ──────────────────────────────────────────────
        if (pdfFile) {
            const assetPath = `downloads/${ts}-${pdfFile.name}`;
            const { error: assetUploadErr } = await sb.storage
                .from('user-products')
                .upload(assetPath, pdfFile);

            if (assetUploadErr) throw new Error('Asset upload failed: ' + assetUploadErr.message);

            const { data: assetData } = sb.storage
                .from('user-products')
                .getPublicUrl(assetPath);

            payload.file_url = assetData.publicUrl;
        }

        setProgress(80);

        // ── 5. Write to database ──────────────────────────────────────────────
        if (editId) {
            // UPDATE existing product
            const { error: updateErr } = await sb
                .from('product_details')
                .update(payload)
                .eq('id', editId);

            if (updateErr) {
                throw new Error(
                    `Save failed (${updateErr.code}): ${updateErr.message}` +
                    (updateErr.hint ? `\nHint: ${updateErr.hint}` : '') +
                    (updateErr.code === '42501' ? '\n👉 RLS: confirm UPDATE policy uses auth.uid() = seller_id.' : '')
                );
            }

            setProgress(100);
            showToast('Changes saved successfully!', 'success');

        } else {
            // INSERT new product
            const { error: insertErr } = await sb
                .from('product_details')
                .insert([payload]);

            if (insertErr) {
                throw new Error(
                    `Publish failed (${insertErr.code}): ${insertErr.message}` +
                    (insertErr.hint ? `\nHint: ${insertErr.hint}` : '') +
                    (insertErr.code === '42501' ? '\n👉 RLS: confirm INSERT policy uses auth.uid() = seller_id.' : '')
                );
            }

            setProgress(100);
            showToast('Boom! Your product is live. 🚀', 'success');
        }

        hideProgress();

        // Brief delay so the toast is readable before redirect
        setTimeout(() => { window.location.href = 'analytics.html'; }, 1800);

    } catch (err) {
        hideProgress();
        console.error('[ariexo dashboard]', err);
        showToast(err.message, 'error');
        btn.textContent = editId ? 'Save Changes' : 'Publish Product';
        btn.disabled = false;
    }
});
</script>
</body>
</html>
