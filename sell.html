<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell on Ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#050505] text-white">
    <div class="max-w-xl mx-auto p-8 glass-card rounded-3xl mt-10 border border-white/10 bg-white/5">
        <h2 class="text-3xl font-bold mb-6 text-indigo-500">List Your Asset</h2>
        <div class="space-y-4">
            <input type="text" id="title" placeholder="Product Name" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">
            <input type="number" id="price" placeholder="Price ($)" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">
            <textarea id="description" placeholder="Description" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl h-32 outline-none focus:border-indigo-500"></textarea>
            
            <label class="block text-sm text-slate-400 font-medium">Step 1: Upload ZIP Asset</label>
            <input type="file" id="zipFileInput" accept=".zip" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer">
            
            <label class="block text-sm text-slate-400 font-medium">Step 2: Preview Image URL (Optional)</label>
            <input type="text" id="imageUrl" placeholder="Paste image link here" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">

            <button onclick="handlePublish()" id="publishBtn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition-all">
                Publish Product
            </button>
            <p id="uploadStatus" class="text-center text-sm mt-2 text-slate-400"></p>
        </div>
    </div>

<script>
const SUPABASE_URL = "https://qtewpjdnnjgvfgllgryy.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Function to automate the upload and database entry
async function handleProductUpload(event) {
    event.preventDefault();
    
    const imageFile = document.getElementById('imageInput').files[0];
    const zipFile = document.getElementById('zipInput').files[0];
    const title = document.getElementById('titleInput').value;

    try {
        // 1. AUTOMATE IMAGE UPLOAD (To Public Bucket)
        const imagePath = `previews/${Date.now()}_${imageFile.name}`;
        const { data: imgData } = await supabase.storage
            .from('public-assets')
            .upload(imagePath, imageFile);

        // Automatically get the Permanent Public URL
        const { data: { publicUrl } } = supabase.storage
            .from('public-assets')
            .getPublicUrl(imagePath);

        // 2. AUTOMATE ZIP UPLOAD (To Private Bucket)
        const zipPath = `downloads/${Date.now()}_${zipFile.name}`;
        await supabase.storage
            .from('product-images')
            .upload(zipPath, zipFile);

        // 3. AUTOMATE DATABASE ENTRY
        const { error } = await supabase
            .from('product_details')
            .insert([{
                title: title,
                image_url: publicUrl, // The auto-generated permanent link
                file_url: zipPath,    // The auto-generated secure path
                price: document.getElementById('priceInput').value,
                description: document.getElementById('descInput').value
            }]);

        if (!error) alert("Product listed automatically!");

    } catch (err) {
        console.error("Automation failed:", err);
    }
}
</script>
</body>
</html>
