<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell on Ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#050505] text-white">
    <div class="max-w-xl mx-auto p-8 glass-card rounded-3xl mt-10 border border-white/10 bg-white/5">
        <h2 class="text-3xl font-bold mb-6 text-indigo-500">List Your Asset</h2>
        <div class="space-y-4">
            <input type="text" id="title" placeholder="Product Name" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">
            <input type="number" id="price" placeholder="Price ($)" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">
            <textarea id="description" placeholder="Description" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl h-32 outline-none focus:border-indigo-500"></textarea>
            
            <label class="block text-sm text-slate-400 font-medium">Step 2: Upload Preview Image</label>
            <input type="file" id="imageFileInput" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer">
            
            <label class="block text-sm text-slate-400 font-medium">Step 2: Preview Image URL (Optional)</label>
            <input type="text" id="imageUrl" placeholder="Paste image link here" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">

            <button onclick="handlePublish()" id="publishBtn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition-all">
                Publish Product
            </button>
            <p id="uploadStatus" class="text-center text-sm mt-2 text-slate-400"></p>
        </div>
    </div>
<script>
    const SUPABASE_URL = "https://qtewpjdnnjgvfgllgryy.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handlePublish() {
    const btn = document.getElementById('publishBtn');
    const status = document.getElementById('uploadStatus');
    
    const title = document.getElementById('title').value;
    const price = document.getElementById('price').value;
    const description = document.getElementById('description').value;
    const zipFile = document.getElementById('zipFileInput').files[0];
    const imageFile = document.getElementById('imageFileInput').files[0];

    if (!zipFile || !imageFile || !title || !price) {
        alert("Please upload both the ZIP and an Image.");
        return;
    }

    btn.innerText = "Uploading...";
    btn.disabled = true;

   try {
        // 1. Upload Image to PUBLIC bucket
        const imgName = `${Date.now()}_${imageFile.name}`;
        const { error: imgError } = await supabase.storage
            .from('public-assets')
            .upload(imgName, imageFile);
        
        if (imgError) throw imgError;

        // Auto-generate the permanent Public URL
        const { data: { publicUrl } } = supabase.storage
            .from('public-assets')
            .getPublicUrl(imgName);

        // 2. Upload ZIP to PRIVATE bucket
        // We use backticks `` and the 'downloads/' prefix to match your Table Editor
       // This ensures the file goes into the 'downloads' folder automatically
const zipName = `${Date.now()}_${zipFile.name}`;
const zipPath = `downloads/${zipName}`;
        
        const { error: zipError } = await supabase.storage
            .from('product-images')
            .upload(zipPath, zipFile);
            
        if (zipError) throw zipError;

        // 3. Insert into Database
        const { error: dbError } = await supabase
            .from('product_details')
            .insert([{
                title: title,
                price: parseFloat(price),
                description: description,
                image_url: publicUrl, // The auto-generated public link
                file_url: zipPath    // The auto-generated internal path (e.g., downloads/123_file.zip)
            }]);

        if (dbError) throw dbError;

        status.innerText = "🚀 Success! Product is live.";
        status.className = "text-center text-sm mt-2 text-green-500";
        btn.innerText = "Publish Product";
        btn.disabled = false;

    } catch (err) {
        console.error("Upload failed:", err);
        status.innerText = "Error: " + err.message;
        status.className = "text-center text-sm mt-2 text-red-500";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
