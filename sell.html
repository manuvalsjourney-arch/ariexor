<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell on Ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#050505] text-white">

    <div class="max-w-xl mx-auto p-8 glass-card rounded-3xl mt-10 border border-white/10 bg-white/5">
        <h2 class="text-3xl font-bold mb-6 text-indigo-500">List Your Asset</h2>
        
        <div class="space-y-4">
            <input type="text" id="title" placeholder="Product Name" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">
            <input type="number" id="price" placeholder="Price ($)" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">
            <textarea id="description" placeholder="Description" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl h-32 outline-none focus:border-indigo-500"></textarea>
            
            <label class="block text-sm text-slate-400 font-medium">Preview Image (JPEG/PNG)</label>
            <input type="file" id="imageFile" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer">

            <label class="block text-sm text-slate-400 font-medium">Google Drive Asset Link</label>
            <input type="text" id="driveLink" placeholder="Paste your Google Drive link here" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-indigo-500">

            <button onclick="handlePublish()" id="publishBtn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-500/20">
                Publish Permanently
            </button>
        </div>
    </div>

    <script>
        // 1. YOUR SUPABASE CONFIG
        const SB_URL = "https://qtewpjdnnjgvfgllgryy.supabase.co";
        const SB_KEY = "YOUR_ANON_KEY"; // Paste your actual Anon Key here
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function handlePublish() {
            const btn = document.getElementById('publishBtn');
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const description = document.getElementById('description').value;
            const driveLink = document.getElementById('driveLink').value;
            const imageFile = document.getElementById('imageFile').files[0];

            if (!title || !price || !driveLink || !imageFile) {
                alert("Please fill all fields and upload an image!");
                return;
            }

            btn.innerText = "Publishing...";
            btn.disabled = true;

            try {
                // 2. Upload Image to Supabase Storage
                const fileName = `${Date.now()}-${imageFile.name}`;
                const { data: imgData, error: imgErr } = await sb.storage
                    .from('product-images')
                    .upload(fileName, imageFile);

                if (imgErr) throw imgErr;

                // 3. Get Public URL for the image
                const { data: publicUrlData } = sb.storage
                    .from('product-images')
                    .getPublicUrl(fileName);

                const imageUrl = publicUrlData.publicUrl;

                // 4. Insert into Database Table
                const { error: dbErr } = await sb
                    .from('product_details')
                    .insert([{
                        title: title,
                        price: parseFloat(price),
                        description: description,
                        image_url: imageUrl,
                        file_url: driveLink // Saving the Google Drive link
                    }]);

                if (dbErr) throw dbErr;

                alert("Product Published Successfully!");
                window.location.href = "index.html"; // Redirect to home

            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            } finally {
                btn.innerText = "Publish Permanently";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
