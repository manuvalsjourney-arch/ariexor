<script>
  const SUPABASE_URL = "https://qtewpjdnnjgvfgllgryy.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU"; // <-- placeholder

  function createSupabaseClient() {
    if (!window.supabase) {
      throw new Error("Supabase SDK not found on window. Make sure you loaded @supabase/supabase-js.");
    }
    return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  function getIdFromSearch() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
  }

  function setLoadingTextToNotFound() {
    // Your HTML says it starts as "Loading..."
    // We try to update a dedicated status element if you have one; otherwise replace the body text.
    const loadingEl =
      document.getElementById("loadingStatus") ||
      document.querySelector("#loading") ||
      document.body;

    loadingEl.textContent = "Product Not Found";
  }

  window.addEventListener("DOMContentLoaded", async () => {
    try {
      console.log("product-details: starting init");

      const id = getIdFromSearch();
      console.log("product-details: id from URL =", id);

      if (!id) {
        alert("Product Not Found: missing ?id= in URL.");
        setLoadingTextToNotFound();
        return;
      }

      const supabase = createSupabaseClient();

      // Fetch full row
      const { data, error } = await supabase
        .from("product_details")
        .select("*")
        .eq("id", id)
        .single();

      console.log("product-details: fetch result =", { data, error });

      if (error) throw error;
      if (!data) {
        alert("Product Not Found.");
        setLoadingTextToNotFound();
        return;
      }

      // Update UI
      const titleEl = document.getElementById("product-title");
      const priceEl = document.getElementById("product-price");
      const descEl = document.getElementById("product-desc");
      const imgEl = document.getElementById("product-img");

      if (titleEl) titleEl.innerText = data.title ?? "";
      if (priceEl) priceEl.innerText = data.price ?? "";
      if (descEl) descEl.innerText = data.description ?? "";

      if (imgEl) {
        imgEl.src = data.image_url ?? "";
      }

      console.log("product-details: UI updated");
    } catch (err) {
      console.error("product-details error:", err);
      alert(err?.message || "Product Not Found");
      setLoadingTextToNotFound();
    }
  });
</script>
<div id="imageModal" class="hidden fixed inset-0 z-[100] bg-black/95 items-center justify-center p-4 cursor-zoom-out" onclick="closeModal()">
    <img id="modalImage" src="" class="max-w-full max-h-full rounded-2xl shadow-2xl">
</div>
