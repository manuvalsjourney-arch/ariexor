<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b14; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
<div class="max-w-5xl mx-auto p-6 mt-20 grid md:grid-cols-2 gap-10">
    <img id="productImage" class="rounded-2xl w-full" src="" alt="" />
    <div>
        <h1 id="productTitle" class="text-4xl font-bold mb-4">Loading...</h1>
        <p id="productPrice" class="text-2xl text-indigo-400 mb-4">$--</p>
        <div class="glass p-4 rounded-xl mb-6">
            <p id="productDescription">Fetching product details...</p>
        </div>
        <div id="errorBox" class="hidden bg-red-900/40 border border-red-500 text-red-300 text-sm p-3 rounded-xl mb-4"></div>
        <button id="downloadBtn"
            class="bg-indigo-600 px-6 py-4 rounded-xl font-bold w-full disabled:opacity-50 disabled:cursor-not-allowed">
            Purchase Asset
        </button>
    </div>
</div>

<script>
   
// 1. Initialize Supabase (ONLY ONCE)
const supabase = window.supabase.createClient(
    'https://qtewpjdnnjgvfgllgryy.supabase.co', 
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU'
);

// 2. Fetch and Display Data
async function loadPage() {
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    const { data: product, error } = await supabase
        .from('product_details')
        .select('*')
        .eq('id', productId)
        .single();

    if (error || !product) {
        document.getElementById('productTitle').innerText = "Product Not Found";
        return;
    }

    // Fill the UI 
    document.getElementById('productTitle').innerText = product.title;
    document.getElementById('productPrice').innerText = `$${product.price}`;
    document.getElementById('productDescription').innerText = product.description;
    document.getElementById('productImage').src = product.image_url;

    // Set up the Download Button
    const btn = document.getElementById('downloadBtn');
    btn.onclick = () => handleDownload(product.file_url);
}

// 3. Instant Download Logic
async function handleDownload(filePath) {
    const btn = document.getElementById('downloadBtn');
    btn.innerText = "Preparing Download...";

    try {
        const { data, error } = await supabase.storage
            .from('product-images')
            .createSignedUrl(filePath, 60);

        if (error) throw error;

        // Trigger the download silently
        const a = document.createElement('a');
        a.href = data.signedUrl;
        a.download = filePath.split('/').pop();
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        btn.innerText = "Download Started!";
    } catch (err) {
        alert("Download failed: " + err.message);
        btn.innerText = "Purchase Asset";
    }
}

// Start the process
loadPage();
   
</script>
</body>
</html>
