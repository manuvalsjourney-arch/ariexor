    );

    function showError(msg) {
        const box = document.getElementById("errorBox");

    }
async function downloadProduct(fileUrl) {
    const statusBtn = document.getElementById('purchase-btn');
    statusBtn.innerText = "Generating Link...";

    try {
        // 1. Get the Signed URL from Supabase
        const { data, error } = await supabase.storage
            .from('product-images')
            .createSignedUrl(fileUrl, 60); // Link valid for 60 seconds

        if (error) throw error;

        // 2. Define the signedUrl here!
        const signedUrl = data.signedUrl;

        // 3. Trigger Instant Download (The "Silent" way)
        const link = document.createElement('a');
        link.href = signedUrl;
        
        // This line forces the browser to download instead of opening a new page
        link.setAttribute('download', fileUrl.split('/').pop()); 
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        statusBtn.innerText = "Download Started!";
        setTimeout(() => { statusBtn.innerText = "Download Again"; }, 3000);

    } catch (err) {
        console.error("Download Error:", err);
        alert("Error: " + err.message);
        statusBtn.innerText = "Download Failed";
    }
}
   
</script>
