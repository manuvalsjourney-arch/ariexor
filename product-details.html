 <script>
    // 1. PROJECT CONFIG
    const SUPABASE_URL = "https://qtewpjdnnjgvfgllgryy.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU"; // PASTE YOUR ACTUAL ANON KEY HERE
    const PURCHASE_BUTTON_ID = "purchaseBtn";

    // 2. INITIALIZE SUPABASE
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 3. GET PRODUCT ID FROM URL (?id=33)
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    // 4. THE BLOB DOWNLOAD FIX (For Mobile ZIPs)
    async function downloadAsset(file_url, assetName = "download.zip") {
        try {
            if (!file_url) throw new Error("Missing file_url");
            
            // This fetch method bypasses the "Processing" error on mobile
            const res = await fetch(file_url, { method: "GET" });
            if (!res.ok) throw new Error("Download failed. Check file in storage.");

            const blob = await res.blob();
            const objectUrl = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = objectUrl;
            a.download = assetName;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(objectUrl);
        } catch (err) {
            console.error("Download error:", err);
            alert("Error downloading ZIP: " + err.message);
        }
    }

    // 5. FETCH DATA AND UPDATE UI
    async function initPage() {
        if (!productId) {
            alert("No Product ID found!");
            return;
        }

        const { data, error } = await supabase
            .from('product_details')
            .select('*')
            .eq('id', productId)
            .single();

        if (error || !data) {
            console.error("Supabase Error:", error);
            document.body.innerHTML = "<h1>Product Not Found</h1>";
            return;
        }

        // REPLACING THE "LOADING..." TEXT
        document.getElementById('product-title').innerText = data.title;
        document.getElementById('product-price').innerText = `$${data.price}`;
        document.getElementById('product-desc').innerText = data.description;
        document.getElementById('product-img').src = data.image_url;

        // SET UP THE PURCHASE BUTTON
        const buyBtn = document.getElementById(PURCHASE_BUTTON_ID);
        if (buyBtn) {
            buyBtn.onclick = () => downloadAsset(data.file_url, `${data.title}.zip`);
        }
    }

    // RUN ON LOAD
    window.addEventListener("DOMContentLoaded", initPage);
</script>
