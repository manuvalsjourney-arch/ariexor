<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: #0b0b14; font-family: 'Inter', sans-serif; color: white; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="fixed w-full z-50 bg-[#0b0b14]/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <span class="text-2xl font-extrabold text-indigo-500 tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">ariexo</span>
            <a href="index.html" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">← Back to Marketplace</a>
        </div>
    </nav>

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
            
            <div class="glass-card p-4 rounded-[2.5rem] relative overflow-hidden">
                <img id="productImage" src="" alt="Loading..." class="w-full aspect-square object-cover rounded-[2rem] shadow-2xl">
            </div>

            <div class="space-y-8">
                <div>
                    <h1 id="productTitle" class="text-4xl md:text-5xl font-extrabold tracking-tighter mb-4">Loading...</h1>
                    <div id="productPrice" class="text-3xl font-bold text-indigo-400">$--</div>
                </div>

                <div class="glass-card p-6 rounded-3xl">
                    <p id="productDescription" class="text-slate-400 leading-relaxed italic">Fetching asset details...</p>
                </div>

                <div class="flex flex-col gap-4">
                    <button id="downloadBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-bold text-lg transition-all transform hover:scale-[1.01]">
                        Purchase Asset
                    </button>
                    <p class="text-center text-[10px] text-slate-500 uppercase tracking-widest font-bold">Secure Checkout Powered by Stripe</p>
                </div>
            </div>
        </div>
    </main>
<script>
  // 1. Configuration
  const SUPABASE_URL = "https://qtewpjdnnjgvfgllgryy.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU"; 

  function createSupabaseClient() {
    if (!window.supabase) throw new Error("Supabase SDK not found. Load @supabase/supabase-js v2.");
    return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  function getIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
  }

  function setNotFound() {
    const titleEl = document.getElementById("productTitle");
    const descEl = document.getElementById("productDescription");
    if (titleEl) titleEl.innerText = "Product Not Found";
    if (descEl) descEl.innerText = "The asset you are looking for does not exist or has been moved.";
    alert("Product Not Found");
  }

  /**
   * Triggers an instant download using a Supabase Signed URL.
   * This prevents 404 errors by creating a temporary access key.
   */
  async function downloadAsset(path, fileName) {
    const downloadBtnEl = document.getElementById("downloadBtn");
    const originalText = downloadBtnEl.innerText;
    
    try {
      // Show loading state on button
      downloadBtnEl.disabled = true;
      downloadBtnEl.innerText = "Preparing Download...";
      
      const supabase = createSupabaseClient();
      
      // 1. Generate a temporary download link (valid for 60 seconds)
      // This bypasses the 404 issue caused by private bucket restrictions
      const { data, error } = await supabase.storage
          .from('user-products') 
          .createSignedUrl(path, 60);

      if (error) throw error;

      // 2. Trigger the "Instant Download" using a hidden anchor tag
      const a = document.createElement("a");
      a.href = data.signedUrl;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();

      // Reset button
      downloadBtnEl.innerText = "Download Started!";
      setTimeout(() => {
        downloadBtnEl.disabled = false;
        downloadBtnEl.innerText = originalText;
      }, 2000);

    } catch (error) {
      console.error("Download Error:", error);
      alert("Error: " + (error.message || "File not found in storage. Check the file path in your database."));
      downloadBtnEl.disabled = false;
      downloadBtnEl.innerText = originalText;
    }
  }

  async function initProductDetails() {
    try {
      const id = getIdFromUrl();
      if (!id) return setNotFound();
      
      const supabase = createSupabaseClient();
      
      // Fetch the product record from Postgres
      const { data, error } = await supabase
        .from("product_details")
        .select("*")
        .eq("id", id)
        .single();

      if (error || !data) {
        console.error("Supabase Fetch Error:", error);
        return setNotFound();
      }

      // UI Element Mapping
      const productTitleEl = document.getElementById("productTitle");
      const productPriceEl = document.getElementById("productPrice");
      const productDescriptionEl = document.getElementById("productDescription");
      const productImageEl = document.getElementById("productImage");
      const downloadBtnEl = document.getElementById("downloadBtn");

      // Extract Data
      const title = data.title ?? "Untitled Asset";
      const price = data.price ?? "0.00";
      const description = data.description ?? "No description provided.";
      const imageUrl = data.image_url ?? "";
      const fileUrl = data.file_url ?? ""; // This should be the PATH in the bucket

      // Update UI
      if (productTitleEl) productTitleEl.innerText = title;
      if (productPriceEl) productPriceEl.innerText = `$${price}`;
      if (productDescriptionEl) productDescriptionEl.innerText = description;
      if (productImageEl && imageUrl) productImageEl.src = imageUrl;

      // Handle Download Button
      if (downloadBtnEl) {
        downloadBtnEl.innerText = "Download Asset";
        downloadBtnEl.disabled = false;
        downloadBtnEl.onclick = () => {
          // Clean the title to create a safe filename
          const safeName = `${String(title).replace(/\s+/g, "_")}.zip`;
          downloadAsset(fileUrl, safeName);
        };
      }

    } catch (err) {
      console.error("Initialization Error:", err);
      setNotFound();
    }
  }

  // Run on page load
  window.addEventListener("DOMContentLoaded", initProductDetails);
</script>


      
</body>
</html>
