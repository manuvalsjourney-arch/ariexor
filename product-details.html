<body class="min-h-screen">

<div class="flex flex-col gap-4">
<a id="downloadBtn" href="#" class="bg-indigo-600 hover:bg-indigo-500 text-center py-5 rounded-2xl font-bold text-lg transition-all transform hover:scale-[1.01] shadow-xl shadow-indigo-500/20">
    Purchase Asset
</a>

<script>
    // 1. Initialize Supabase (Only ONCE)
    const sb = supabase.createClient('https://qtewpjdnnjgvfgllgryy.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU');

async function loadProductDetails() {
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    const { data, error } = await sb
        .from('product_details')
        .select('*')
        .eq('id', productId)
        .single();

    if (data) {
        // 1. Update UI Elements
        document.getElementById('productImage').src = data.image_url;
        document.getElementById('productTitle').innerText = data.title;
        document.getElementById('productPrice').innerText = `$${data.price}`;
        document.getElementById('productDescription').innerText = data.description;

        // 2. Direct Link Logic (This fixes the alert error!)
        const btn = document.getElementById('downloadBtn');
        
        btn.onclick = (e) => {
            e.preventDefault();
            if (data.file_url) {
                // Opens your Google Drive link immediately in a new tab
                window.open(data.file_url, '_blank');
            } else {
                alert("Download link not found in the database.");
            }
        };
    }
}
// Modal Functions
function openModal() {
    const modal = document.getElementById('imageModal');
    if(modal) {
        modal.classList.replace('hidden', 'flex');
        document.getElementById('modalImage').src = document.getElementById('productImage').src;
    }
}

function closeModal() {
    const modal = document.getElementById('imageModal');
    if(modal) modal.classList.replace('flex', 'hidden');
}

window.onload = loadProductDetails;
</script>

<div id="imageModal" class="hidden fixed inset-0 z-[100] bg-black/95 items-center justify-center p-4 cursor-zoom-out" onclick="closeModal()">
    <img id="modalImage" src="" class="max-w-full max-h-full rounded-2xl shadow-2xl">
</div>
