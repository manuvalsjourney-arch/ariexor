 <script>
  // =========================
  // CONFIG
  // =========================
  const SUPABASE_URL = "https://qtewpjdnnjgvfgllgryy.supabase.co";
  const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY_HERE"; // <-- placeholder

  // If your HTML uses these IDs, keep them consistent:
  const PURCHASE_BUTTON_ID = "purchaseBtn"; // optional (only if you have a button)
  const LOADING_ID = "loadingStatus"; // optional (recommended)

  // =========================
  // Supabase client
  // =========================
  function createSupabaseClient() {
    if (!window.supabase) {
      throw new Error("Supabase SDK not found. Load @supabase/supabase-js v2 on this page.");
    }
    return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  // =========================
  // Helpers
  // =========================
  function getProductIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
  }

  function setLoadingText(text) {
    const el = document.getElementById(LOADING_ID) || document.body;
    el.textContent = text;
  }

  async function downloadAsset(file_url, assetName = "download.zip") {
    try {
      if (!file_url) throw new Error("Missing file_url");

      // Strict ZIP download logic: ALWAYS fetch as blob
      const res = await fetch(file_url, { method: "GET" });
      if (!res.ok) {
        throw new Error(`Download failed: ${res.status} ${res.statusText}`);
      }

      const blob = await res.blob();

      // Create temp object URL
      const objectUrl = URL.createObjectURL(blob);

      // Hidden anchor click to force download (mobile-friendly)
      const a = document.createElement("a");
      a.href = objectUrl;
      a.download = assetName || "download.zip";
      a.style.display = "none";
      document.body.appendChild(a);

      a.click();

      a.remove();
      URL.revokeObjectURL(objectUrl);
    } catch (err) {
      console.error("downloadAsset error:", err);
      alert(err?.message || "Could not download the ZIP file.");
    }
  }

  // =========================
  // Main init
  // =========================
  async function initProductDetails() {
    try {
      setLoadingText("Loading...");

      const supabase = createSupabaseClient();

      const productId = getProductIdFromUrl();
      if (!productId) {
        alert("Product Not Found: missing id in URL.");
        setLoadingText("Product Not Found");
        return;
      }

      // Fetch row
      const { data, error } = await supabase
        .from("product_details")
        .select("id, title, price, description, image_url, file_url")
        .eq("id", productId)
        .single();

      if (error) {
        throw error;
      }

      if (!data) {
        alert("Product Not Found.");
        setLoadingText("Product Not Found");
        return;
      }

      // UI updates
      const titleEl = document.getElementById("product-title");
      const priceEl = document.getElementById("product-price");
      const descEl = document.getElementById("product-desc");
      const imgEl = document.getElementById("product-img");

      if (titleEl) titleEl.textContent = data.title ?? "";
      if (priceEl) priceEl.textContent = data.price ?? "";
      if (descEl) descEl.textContent = data.description ?? "";

      if (imgEl) {
        imgEl.src = data.image_url ?? "";
      }

      // Optional: wire purchase button if present
      const purchaseBtn = document.getElementById(PURCHASE_BUTTON_ID);
      if (purchaseBtn && data.file_url) {
        purchaseBtn.disabled = false;
        purchaseBtn.textContent = "Purchase";

        purchaseBtn.onclick = async () => {
          const safeName = `${(data.title || "download").replace(/\s+/g, "_")}.zip`;
          await downloadAsset(data.file_url, safeName);
        };
      }

      setLoadingText(""); // clear loading text
    } catch (err) {
      console.error("initProductDetails error:", err);
      alert("Product Not Found");
      setLoadingText("Product Not Found");
    }
  }

  window.addEventListener("DOMContentLoaded", initProductDetails);

</script>
