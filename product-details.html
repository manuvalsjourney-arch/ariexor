<body class="min-h-screen">

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-4">

<div class="flex flex-col gap-4">
<a id="downloadBtn" href="#" class="bg-indigo-600 hover:bg-indigo-500 text-center py-5 rounded-2xl font-bold text-lg transition-all transform hover:scale-[1.01] shadow-xl shadow-indigo-500/20">
    Purchase Asset
</a>
      
    <p class="text-center text-[10px] text-slate-500 uppercase tracking-widest font-bold">Secure Checkout Powered by Stripe</p>
</div>
<script>
  // =========================
  // CONFIG (edit these)
  // =========================
  const SUPABASE_URL = "https://qtewpjdnnjgvfgllgryy.supabase.co"; // e.g. https://xxxx.supabase.co
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU";
  const PURCHASE_BUTTON_ID = "purchaseBtn"; // <-- must match your button id in HTML

  // =========================
  // Helper: init supabase client
  // =========================
  function createSupabaseClient() {
    if (!window.supabase) {
      throw new Error(
        "Supabase SDK not found. Make sure you loaded @supabase/supabase-js v2 and it exposes window.supabase."
      );
    }
    return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  // =========================
  // Helper: parse URL ?id=...
  // =========================
  function getProductIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
  }

  // =========================
  // Blob download + Drive open
  // =========================
  async function downloadAsset(file_url, assetName = "download") {
    try {
      if (!file_url) throw new Error("Missing file_url");

      // Google Drive: open directly
      if (file_url.includes("drive.google.com")) {
        window.location.href = file_url;
        return;
      }

      // Supabase URL: download as blob
      const res = await fetch(file_url, { method: "GET" });

      if (!res.ok) {
        throw new Error(`Download failed: ${res.status} ${res.statusText}`);
      }

      const blob = await res.blob();

      // Try to extract filename from Content-Disposition
      let filename = assetName;
      const cd = res.headers.get("Content-Disposition");
      if (cd) {
        const match = cd.match(
          /filename\*?=(?:UTF-8'')?["']?([^"';\n]+)["']?/i
        );
        if (match && match[1]) filename = decodeURIComponent(match[1]);
      }

      // Fallback: take last part of URL path
      if (!filename || filename === "download") {
        try {
          const u = new URL(file_url);
          const last = u.pathname.split("/").filter(Boolean).pop();
          if (last) filename = last;
        } catch (_) {}
      }

      // Force download
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename || "download";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } catch (err) {
      console.error("downloadAsset error:", err);
      alert(err?.message || "Could not download file.");
    }
  }

  // =========================
  // Main: fetch product row and wire Purchase button
  // =========================
  async function initProductDetails() {
    const supabase = createSupabaseClient();
    const productId = getProductIdFromUrl();

    if (!productId) {
      console.error("Missing ?id=... in URL");
      alert("Missing product id in URL.");
      return;
    }

    // Fetch row
    const { data, error } = await supabase
      .from("product_details")
      .select("id, title, file_url")
      .eq("id", productId)
      .single();

    if (error) {
      console.error("Failed to load product_details:", error);
      alert("Could not load product details.");
      return;
    }

    const fileUrl = data?.file_url;
    const title = data?.title || "download";

    // Wire button
    const purchaseBtn = document.getElementById(PURCHASE_BUTTON_ID);
    if (!purchaseBtn) {
      console.error(`Purchase button not found: #${PURCHASE_BUTTON_ID}`);
      return;
    }

    if (!fileUrl) {
      purchaseBtn.disabled = true;
      purchaseBtn.textContent = "No file available";
      return;
    }

    purchaseBtn.disabled = false;
    purchaseBtn.textContent = "Purchase";

    purchaseBtn.onclick = async () => {
      await downloadAsset(fileUrl, `${title}.zip`);
    };
  }

  window.addEventListener("DOMContentLoaded", initProductDetails);
</script>
<div id="imageModal" class="hidden fixed inset-0 z-[100] bg-black/95 items-center justify-center p-4 cursor-zoom-out" onclick="closeModal()">
    <img id="modalImage" src="" class="max-w-full max-h-full rounded-2xl shadow-2xl">
</div>
