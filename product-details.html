<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b14; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="max-w-5xl mx-auto p-6 mt-20 grid md:grid-cols-2 gap-10">
        <div>
            <img id="productImage" class="rounded-2xl w-full object-cover shadow-2xl" src="" alt="Product Preview" />
        </div>
        <div>
            <h1 id="productTitle" class="text-4xl font-bold mb-4">Loading...</h1>
            <p id="productPrice" class="text-3xl text-indigo-400 font-semibold mb-6">$--</p>
            <div class="glass p-6 rounded-2xl mb-8">
                <h3 class="text-sm uppercase tracking-widest text-gray-400 mb-2 font-bold">Description</h3>
                <p id="productDescription" class="text-gray-300 leading-relaxed">Fetching product details...</p>
            </div>
            <button id="downloadBtn" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-4 rounded-xl font-bold w-full text-lg shadow-lg">
                Purchase & Download
            </button>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://qtewpjdnnjgvfgllgryy.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU'
        );

        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            const { data: product, error } = await supabase
                .from('product_details')
                .select('*')
                .eq('id', productId)
                .single();

            if (error || !product) {
                document.getElementById('productTitle').innerText = "Product Not Found";
                return;
            }

            document.getElementById('productTitle').innerText = product.title;
            document.getElementById('productPrice').innerText = `$${product.price}`;
            document.getElementById('productDescription').innerText = product.description;
            document.getElementById('productImage').src = product.image_url;

            document.getElementById('downloadBtn').onclick = () => startDownload(product.file_url);
        }

        async function startDownload(filePath) {
            const btn = document.getElementById('downloadBtn');
            btn.innerText = "Generating Link...";
            try {
                const { data, error } = await supabase.storage
                    .from('product-images')
                    .createSignedUrl(filePath, 60);

                if (error) throw error;

                const link = document.createElement('a');
                link.href = data.signedUrl;
                link.setAttribute('download', filePath.split('/').pop());
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                btn.innerText = "Download Started!";
            } catch (err) {
                alert("Error: " + err.message);
                btn.innerText = "Purchase & Download";
            }
        }

        loadProduct();
    </script>
</body>
</html>
