<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: #0b0b14; font-family: 'Inter', sans-serif; color: white; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="fixed w-full z-50 bg-[#0b0b14]/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <span class="text-2xl font-extrabold text-indigo-500 tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">ariexo</span>
            <a href="index.html" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">← Back to Marketplace</a>
        </div>
    </nav>

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
            
            <div class="glass-card p-4 rounded-[2.5rem] relative overflow-hidden">
                <img id="productImage" src="" alt="Loading..." class="w-full aspect-square object-cover rounded-[2rem] shadow-2xl">
            </div>

            <div class="space-y-8">
                <div>
                    <h1 id="productTitle" class="text-4xl md:text-5xl font-extrabold tracking-tighter mb-4">Loading...</h1>
                    <div id="productPrice" class="text-3xl font-bold text-indigo-400">$--</div>
                </div>

                <div class="glass-card p-6 rounded-3xl">
                    <p id="productDescription" class="text-slate-400 leading-relaxed italic">Fetching asset details...</p>
                </div>

                <div class="flex flex-col gap-4">
                    <button id="downloadBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-bold text-lg transition-all transform hover:scale-[1.01]">
                        Purchase Asset
                    </button>
                    <p class="text-center text-[10px] text-slate-500 uppercase tracking-widest font-bold">Secure Checkout Powered by Stripe</p>
                </div>
            </div>
        </div>
    </main>
<script>
  const SUPABASE_URL = "https://qtewpjdnnjgvfgllgryy.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU"; 

  function createSupabaseClient() {
    return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  /**
   * Marketplace Router
   * This function "guesses" what kind of link the seller provided
   */
  async function handleMarketplaceDownload(rawUrl, title) {
    const btn = document.getElementById("downloadBtn");
    const originalText = btn.innerText;

    // 1. EXTERNAL ROUTE: If it's Google Drive or any other website
    if (rawUrl.includes("drive.google.com") || (!rawUrl.includes("supabase.co") && rawUrl.startsWith("http"))) {
      window.open(rawUrl, "_blank");
      return;
    }

    // 2. INTERNAL ROUTE: If it's a Supabase link
    try {
      btn.disabled = true;
      btn.innerText = "Generating Access...";

      const supabase = createSupabaseClient();
      
      // Smart extraction for different buckets (product-images OR user-products)
      const isPublic = rawUrl.includes('/public/');
      const urlParts = rawUrl.split(isPublic ? '/public/' : '/authenticated/')[1].split('/');
      const bucketName = urlParts[0];
      const filePath = urlParts.slice(1).join('/');

      const { data, error } = await supabase.storage
          .from(bucketName)
          .createSignedUrl(filePath, 60);

      if (error) throw error;

      // Trigger the instant background download
      const a = document.createElement("a");
      a.href = data.signedUrl;
      a.download = `${title.replace(/\s+/g, "_")}`; 
      document.body.appendChild(a);
      a.click();
      a.remove();

      btn.innerText = "Success!";
      setTimeout(() => { btn.disabled = false; btn.innerText = originalText; }, 2000);

    } catch (err) {
      console.error("Marketplace Download Error:", err);
      alert("This seller's file is currently unavailable. Please contact support.");
      btn.disabled = false;
      btn.innerText = originalText;
    }
  }

  async function initProductDetails() {
    const id = new URLSearchParams(window.location.search).get("id");
    if (!id) return;

    try {
      const supabase = createSupabaseClient();
      const { data, error } = await supabase.from("product_details").select("*").eq("id", id).single();
      
      if (error || !data) {
          document.getElementById("productTitle").innerText = "Item Not Found";
          return;
      }

      // Populate Marketplace UI
      document.getElementById("productTitle").innerText = data.title;
      document.getElementById("productPrice").innerText = `$${data.price}`;
      document.getElementById("productDescription").innerText = data.description;
      document.getElementById("productImage").src = data.image_url;

      const btn = document.getElementById("downloadBtn");
      // Self-healing: Only activate if a file exists
      if (data.file_url && data.file_url.length > 5) {
        btn.disabled = false;
        btn.onclick = () => handleMarketplaceDownload(data.file_url, data.title);
      } else {
        btn.disabled = true;
        btn.innerText = "No Download Available";
      }
    } catch (err) { console.error(err); }
  }

  window.addEventListener("DOMContentLoaded", initProductDetails);
</script>
      
</body>
</html>
