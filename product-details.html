<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0b0b14] text-white font-['Inter'] p-6 md:p-12">
    <div id="product-content" class="max-w-5xl mx-auto">
        <div class="animate-pulse flex flex-col gap-8">
            <div class="h-96 bg-slate-900 rounded-3xl w-full"></div>
            <div class="h-10 bg-slate-900 rounded w-1/2"></div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://qtewpjdnnjgvfgllgryy.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU');

        async function handlePurchase() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                alert("Please log in to make a purchase!");
                window.location.href = 'login.html';
                return;
            }
            alert("Redirecting to secure checkout...");
        }

        async function loadDetails() {
            const id = new URLSearchParams(window.location.search).get('id');
            const { data, error } = await sb.from('product_details').select('*').eq('id', id).single();
            
            if (data) {
                document.getElementById('product-content').innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                        <img src="${data.image_url}" class="w-full h-[500px] object-cover rounded-[2.5rem] shadow-2xl">
                        <div class="flex flex-col justify-center">
                            <h1 class="text-5xl font-extrabold mb-4 tracking-tighter">${data.title}</h1>
                            <p class="text-2xl text-indigo-400 font-bold mb-6">$${data.price}</p>
                            <div class="bg-white/5 p-8 rounded-3xl mb-8 border border-white/5">
                                <p class="text-slate-400 leading-relaxed">${data.description}</p>
                            </div>
                            <button onclick="handlePurchase()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-bold text-lg transition-all transform hover:scale-[1.02]">
                                Purchase Asset
                            </button>
                            <a href="index.html" class="text-center mt-6 text-slate-500 hover:text-white transition-colors text-sm">← Back to Marketplace</a>
                        </div>
                    </div>
                `;
            }
        }
        loadDetails();
    </script>
</body>
</html>
