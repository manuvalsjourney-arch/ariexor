<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0b14; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
<div class="max-w-5xl mx-auto p-6 mt-20 grid md:grid-cols-2 gap-10">
    <img id="productImage" class="rounded-2xl w-full" src="" alt="" />
    <div>
        <h1 id="productTitle" class="text-4xl font-bold mb-4">Loading...</h1>
        <p id="productPrice" class="text-2xl text-indigo-400 mb-4">$--</p>
        <div class="glass p-4 rounded-xl mb-6">
            <p id="productDescription">Fetching product details...</p>
        </div>
        <div id="errorBox" class="hidden bg-red-900/40 border border-red-500 text-red-300 text-sm p-3 rounded-xl mb-4"></div>
        <button id="downloadBtn"
            class="bg-indigo-600 px-6 py-4 rounded-xl font-bold w-full disabled:opacity-50 disabled:cursor-not-allowed">
            Purchase Asset
        </button>
    </div>
</div>

<script>
    // 1. Initialize Supabase Client
    const productSupabase = window.supabase.createClient(
        'https://qtewpjdnnjgvfgllgryy.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0ZXdwamRubmpndmZnbGxncnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDgzMTksImV4cCI6MjA5MTM4NDMxOX0.SEjH2oD8nh-6Ff3yoDXlD93Ick9ZKf4_PD0lKWsSvDU'
    );

    function showError(msg) {
        const box = document.getElementById("errorBox");
        box.textContent = msg;
        box.classList.remove("hidden");
    }

    async function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
            showError("No product ID found.");
            return;
        }

        try {
            const { data, error } = await productSupabase
                .from("product_details")
                .select("*")
                .eq("id", id)
                .single();

            if (error || !data) {
                showError("Product not found.");
                return;
            }

            // Fill UI
            document.getElementById("productTitle").innerText = data.title;
            document.getElementById("productPrice").innerText = "$" + data.price;
            document.getElementById("productDescription").innerText = data.description;
            document.getElementById("productImage").src = data.image_url;

            const btn = document.getElementById("downloadBtn");
            if (data.file_url) {
                // Connect the button to the SECURE function
                btn.onclick = () => downloadSecureFile(data.file_url);
                btn.disabled = false;
            } else {
                btn.innerText = "No File Available";
                btn.disabled = true;
            }
        } catch (err) {
            showError("System Error: " + err.message);
        }
    }

    // THE SECURE DOWNLOAD FUNCTION
    async function downloadSecureFile(fileInput) {
      try {
        const btn = document.getElementById("downloadBtn");
        btn.innerText = "Securing Connection...";
        btn.disabled = true;

        // 1. Handle Google Drive links
        if (fileInput.includes('drive.google.com')) {
          window.open(fileInput, '_blank');
          btn.innerText = "Purchase Asset";
          btn.disabled = false;
          return;
        }

        // 2. Clean the path (remove full URL if present)
        let filePath = fileInput;
        if (filePath.startsWith('http')) {
           const parts = filePath.split('/product-images/');
           filePath = parts[1] ? decodeURIComponent(parts[1].split('?')[0]) : filePath;
        }

        // 3. ASK SUPABASE FOR THE 60-SECOND SECRET LINK
        const { data, error } = await productSupabase.storage
          .from('product-images')
          .createSignedUrl(filePath, 60);

        if (error || !data.signedUrl) {
          throw new Error(error ? error.message : "Access Denied");
        }

        // 4. TRIGGER THE DOWNLOAD
        const link = document.createElement('a');
        link.href = data.signedUrl;
        link.download = filePath.split('/').pop();
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        btn.innerText = "Purchase Asset";
        btn.disabled = false;

      } catch (error) {
        console.error('Download Error:', error);
        alert(`Security Error: ${error.message}`);
        document.getElementById("downloadBtn").innerText = "Purchase Asset";
        document.getElementById("downloadBtn").disabled = false;
      }
    }

    loadProduct();
</script>
</body>
</html>
