<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forjify | Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-deep-charcoal text-white min-h-screen">
  <nav class="bg-deep-charcoal border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="/" class="text-2xl font-bold text-electric-blue">Forjify</a>
        <div class="space-x-4">
          <a href="/login" class="text-gray-300 hover:text-electric-blue transition-colors">Login</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-12">
    <div class="grid gap-12 lg:grid-cols-[1fr_1fr] items-start">
      <div>
        <p class="text-sm uppercase tracking-[0.3em] text-electric-blue mb-4">Start your journey</p>
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-6">Create your creator account</h1>
        <p class="text-gray-300 text-lg max-w-xl mb-8">Join thousands of professionals buying and selling premium digital assets.</p>
      </div>

      <section class="bg-gray-900/95 border border-gray-800 rounded-3xl p-8 shadow-2xl">
        <h2 class="text-2xl font-semibold text-white mb-6">Sign up</h2>
        
        <form id="signupForm" class="space-y-4">
          <div class="grid grid-cols-2 gap-4 mb-6">
            <label class="relative cursor-pointer">
                <input type="radio" name="role" value="buyer" checked class="peer sr-only">
                <div class="p-4 text-center rounded-2xl border border-gray-700 bg-gray-900 peer-checked:border-electric-blue peer-checked:ring-1 peer-checked:ring-electric-blue transition-all">
                    <span class="block text-sm font-medium text-gray-400 peer-checked:text-white">Buyer</span>
                </div>
            </label>
            <label class="relative cursor-pointer">
                <input type="radio" name="role" value="seller" class="peer sr-only">
                <div class="p-4 text-center rounded-2xl border border-gray-700 bg-gray-900 peer-checked:border-electric-blue peer-checked:ring-1 peer-checked:ring-electric-blue transition-all">
                    <span class="block text-sm font-medium text-gray-400 peer-checked:text-white">Seller</span>
                </div>
            </label>
          </div>

          <label class="block">
            <span class="text-gray-300">Email</span>
            <input id="email" type="email" required class="mt-1 w-full rounded-2xl border border-gray-700 bg-gray-900 px-4 py-3 text-white outline-none focus:border-electric-blue focus:ring-2 focus:ring-electric-blue/30" placeholder="you@example.com" />
          </label>

          <label class="block">
            <span class="text-gray-300">Password</span>
            <input id="password" type="password" required minlength="8" class="mt-1 w-full rounded-2xl border border-gray-700 bg-gray-900 px-4 py-3 text-white outline-none focus:border-electric-blue focus:ring-2 focus:ring-electric-blue/30" placeholder="Min. 8 characters" />
          </label>

          <button type="submit" id="submitBtn" class="w-full bg-electric-blue hover:bg-blue-700 text-white font-semibold rounded-2xl px-4 py-3 transition mt-2">
            Create Account
          </button>
        </form>
      </section>
    </div>
  </main>

  <script>
    // 1. Initialize Supabase
    const supabaseUrl = 'https://qtewpjdnnjgvfgllgryy.supabase.co';
    // IMPORTANT: Paste your actual long ANON KEY inside the quotes below
    const supabaseKey = 'PASTE_YOUR_ANON_KEY_HERE'; 
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // 2. Handle Form Submission
    const signupForm = document.getElementById('signupForm');
    
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.innerText = "Creating account...";
      submitBtn.disabled = true;

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.querySelector('input[name="role"]:checked').value;

      const { data, error } = await _supabase.auth.signUp({
        email: email,
        password: password,
        options: {
          data: { user_role: role }
        }
      });

      if (error) {
        alert("Error: " + error.message);
        submitBtn.innerText = "Create Account";
        submitBtn.disabled = false;
      } else {
        alert("Success! Check your email for a confirmation link.");
        window.location.href = "/login";
      }
    });

    lucide.createIcons();
  </script>
</body>
</html>
