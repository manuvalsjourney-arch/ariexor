<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join ariexo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #e2e8f0; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .input-glass { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); }
        /* Style for selected role */
        input[type="radio"]:checked + label { border-color: #6366f1; background: rgba(99, 102, 241, 0.1); color: white; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="glass-card rounded-[2.5rem] p-10 shadow-2xl">
            <h1 class="text-3xl font-bold mb-2">Create Account</h1>
            <p class="text-slate-400 mb-6 text-sm">Join the global marketplace.</p>

            <form id="signupForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <input type="radio" name="userRole" id="roleBuyer" value="buyer" class="hidden" checked>
                        <label for="roleBuyer" class="flex flex-col items-center justify-center p-4 border border-white/10 rounded-2xl cursor-pointer hover:bg-white/5 transition-all text-slate-400">
                            <span class="text-2xl mb-1">🛍️</span>
                            <span class="text-xs font-bold uppercase tracking-wider">Buyer</span>
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="userRole" id="roleSeller" value="seller" class="hidden">
                        <label for="roleSeller" class="flex flex-col items-center justify-center p-4 border border-white/10 rounded-2xl cursor-pointer hover:bg-white/5 transition-all text-slate-400">
                            <span class="text-2xl mb-1">🚀</span>
                            <span class="text-xs font-bold uppercase tracking-wider">Seller</span>
                        </label>
                    </div>
                </div>

                <input type="text" id="fullName" required placeholder="Full Name" class="input-glass w-full p-4 rounded-2xl text-white">
                <input type="email" id="email" required placeholder="Email Address" class="input-glass w-full p-4 rounded-2xl text-white">
                <input type="password" id="password" required placeholder="Password" class="input-glass w-full p-4 rounded-2xl text-white">
                
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold hover:bg-indigo-500 transition-all mt-4">
                    Sign Up
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = supabase.createClient('https://jiuzebbrjbqkoovfrbvp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppdXplYmJyamJxa29vdmZyYnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDc0NzYsImV4cCI6MjA5MzAyMzQ3Nn0.EWf2226D-wJZE25MLzqOToC-1LFu3o7vb0Sqi0q8FSc');

        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const selectedRole = document.querySelector('input[name="userRole"]:checked').value;
            
            btn.innerText = "Creating account...";
            
            const { data, error } = await sb.auth.signUp({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                options: { 
                    data: { 
                        full_name: document.getElementById('fullName').value,
                        role: selectedRole // SAVING THE ROLE HERE
                    } 
                }
            });

            if (error) {
                alert(error.message);
                btn.innerText = "Sign Up";
            } else {
                // Save to localStorage so the website knows immediately
                localStorage.setItem('userRole', selectedRole);
                alert('Success! Check your email to confirm.');
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
